framework: paddlepaddle
last_updated: "2026-03-06"
description: "PaddlePaddle 常用算子目录（PaddlePaddle >= 2.0）"

# 字段说明：
#   name         算子的完整 Python API 路径
#   category     算子分类（同 pytorch.yaml）
#   since        首次引入该算子的 PaddlePaddle 版本（"major.minor"）
#   deprecated   标记废弃的起始版本（可选）
#   removed      正式移除的版本（可选）
#   aliases      其他等价 API 路径（可选列表）
#   note         补充说明（可选）

operators:
  # ============================
  # 激活函数（activation）
  # ============================
  - name: paddle.nn.ReLU
    category: activation
    since: "2.0"
    aliases: [paddle.nn.functional.relu]

  - name: paddle.nn.LeakyReLU
    category: activation
    since: "2.0"
    aliases: [paddle.nn.functional.leaky_relu]

  - name: paddle.nn.PReLU
    category: activation
    since: "2.0"

  - name: paddle.nn.ELU
    category: activation
    since: "2.0"
    aliases: [paddle.nn.functional.elu]

  - name: paddle.nn.SELU
    category: activation
    since: "2.0"
    aliases: [paddle.nn.functional.selu]

  - name: paddle.nn.GELU
    category: activation
    since: "2.0"
    aliases: [paddle.nn.functional.gelu]

  - name: paddle.nn.Mish
    category: activation
    since: "2.2"
    aliases: [paddle.nn.functional.mish]

  - name: paddle.nn.Swish
    category: activation
    since: "2.0"
    aliases: [paddle.nn.functional.swish]

  - name: paddle.nn.Sigmoid
    category: activation
    since: "2.0"
    aliases: [paddle.nn.functional.sigmoid, paddle.sigmoid]

  - name: paddle.nn.Tanh
    category: activation
    since: "2.0"
    aliases: [paddle.nn.functional.tanh, paddle.tanh]

  - name: paddle.nn.Softmax
    category: activation
    since: "2.0"
    aliases: [paddle.nn.functional.softmax]

  - name: paddle.nn.LogSoftmax
    category: activation
    since: "2.0"
    aliases: [paddle.nn.functional.log_softmax]

  - name: paddle.nn.Hardswish
    category: activation
    since: "2.0"
    aliases: [paddle.nn.functional.hardswish]

  - name: paddle.nn.Hardsigmoid
    category: activation
    since: "2.0"
    aliases: [paddle.nn.functional.hardsigmoid]

  - name: paddle.nn.ReLU6
    category: activation
    since: "2.0"
    aliases: [paddle.nn.functional.relu6]

  - name: paddle.nn.Silu
    category: activation
    since: "2.4"
    aliases: [paddle.nn.functional.silu]

