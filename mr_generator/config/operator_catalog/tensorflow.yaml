framework: tensorflow
last_updated: "2026-03-06"
description: "TensorFlow/Keras 常用算子目录（TensorFlow >= 2.0）"

# 字段说明：
#   name         算子的完整 Python API 路径
#   category     算子分类（同 pytorch.yaml）
#   since        首次引入该算子的 TensorFlow 版本（"major.minor"）
#   deprecated   标记废弃的起始版本（可选）
#   removed      正式移除的版本（可选）
#   aliases      其他等价 API 路径（可选列表）
#   note         补充说明（可选）

operators:
  # ============================
  # 激活函数（activation）
  # ============================
  - name: tf.keras.layers.ReLU
    category: activation
    since: "2.0"
    aliases: [tf.keras.activations.relu, tf.nn.relu]

  - name: tf.keras.layers.LeakyReLU
    category: activation
    since: "2.0"
    aliases: [tf.nn.leaky_relu]

  - name: tf.keras.layers.PReLU
    category: activation
    since: "2.0"

  - name: tf.keras.layers.ELU
    category: activation
    since: "2.0"
    aliases: [tf.nn.elu]

  - name: tf.keras.layers.Activation
    category: activation
    since: "2.0"
    note: "通用激活层，通过 activation 参数指定"

  - name: tf.keras.activations.gelu
    category: activation
    since: "2.4"
    aliases: [tf.nn.gelu]

  - name: tf.keras.activations.sigmoid
    category: activation
    since: "2.0"
    aliases: [tf.nn.sigmoid, tf.sigmoid]

  - name: tf.keras.activations.tanh
    category: activation
    since: "2.0"
    aliases: [tf.nn.tanh, tf.tanh]

  - name: tf.keras.activations.softmax
    category: activation
    since: "2.0"
    aliases: [tf.nn.softmax]

  - name: tf.keras.activations.softplus
    category: activation
    since: "2.0"
    aliases: [tf.nn.softplus]

  - name: tf.keras.activations.selu
    category: activation
    since: "2.0"
    aliases: [tf.nn.selu]

  - name: tf.keras.activations.swish
    category: activation
    since: "2.0"
    aliases: [tf.nn.swish]

  - name: tf.keras.activations.mish
    category: activation
    since: "2.12"

  # ============================
  # 归一化（normalization）
  # ============================
  - name: tf.keras.layers.BatchNormalization
    category: normalization
    since: "2.0"

  - name: tf.keras.layers.LayerNormalization
    category: normalization
    since: "2.0"

  - name: tf.keras.layers.GroupNormalization
    category: normalization
    since: "2.12"

  - name: tf.keras.layers.UnitNormalization
    category: normalization
    since: "2.12"

  - name: tf.keras.layers.SpectralNormalization
    category: normalization
    since: "2.11"

  # ============================
  # 池化（pooling）
  # ============================
  - name: tf.keras.layers.MaxPooling1D
    category: pooling
    since: "2.0"
    aliases: [tf.keras.layers.MaxPool1D]

  - name: tf.keras.layers.MaxPooling2D
    category: pooling
    since: "2.0"
    aliases: [tf.keras.layers.MaxPool2D]

  - name: tf.keras.layers.MaxPooling3D
    category: pooling
    since: "2.0"
    aliases: [tf.keras.layers.MaxPool3D]

  - name: tf.keras.layers.AveragePooling1D
    category: pooling
    since: "2.0"
    aliases: [tf.keras.layers.AvgPool1D]

  - name: tf.keras.layers.AveragePooling2D
    category: pooling
    since: "2.0"
    aliases: [tf.keras.layers.AvgPool2D]

  - name: tf.keras.layers.AveragePooling3D
    category: pooling
    since: "2.0"
    aliases: [tf.keras.layers.AvgPool3D]

  - name: tf.keras.layers.GlobalMaxPooling1D
    category: pooling
    since: "2.0"

  - name: tf.keras.layers.GlobalMaxPooling2D
    category: pooling
    since: "2.0"

  - name: tf.keras.layers.GlobalMaxPooling3D
    category: pooling
    since: "2.0"

  - name: tf.keras.layers.GlobalAveragePooling1D
    category: pooling
    since: "2.0"

  - name: tf.keras.layers.GlobalAveragePooling2D
    category: pooling
    since: "2.0"

  - name: tf.keras.layers.GlobalAveragePooling3D
    category: pooling
    since: "2.0"

  # ============================
  # 卷积（convolution）
  # ============================
  - name: tf.keras.layers.Conv1D
    category: convolution
    since: "2.0"

  - name: tf.keras.layers.Conv2D
    category: convolution
    since: "2.0"

  - name: tf.keras.layers.Conv3D
    category: convolution
    since: "2.0"

  - name: tf.keras.layers.Conv1DTranspose
    category: convolution
    since: "2.0"

  - name: tf.keras.layers.Conv2DTranspose
    category: convolution
    since: "2.0"

  - name: tf.keras.layers.Conv3DTranspose
    category: convolution
    since: "2.0"

  - name: tf.keras.layers.DepthwiseConv1D
    category: convolution
    since: "2.6"

  - name: tf.keras.layers.DepthwiseConv2D
    category: convolution
    since: "2.0"

  - name: tf.keras.layers.SeparableConv1D
    category: convolution
    since: "2.0"

  - name: tf.keras.layers.SeparableConv2D
    category: convolution
    since: "2.0"

  # ============================
