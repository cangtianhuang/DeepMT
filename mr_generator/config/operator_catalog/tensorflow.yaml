  - name: tf.keras.layers.LSTMCell
    category: recurrent
    since: "2.0"

  - name: tf.keras.layers.GRUCell
    category: recurrent
    since: "2.0"

  - name: tf.keras.layers.SimpleRNNCell
    category: recurrent
    since: "2.0"

  # ============================
  # Transformer（transformer）
  # ============================
  - name: tf.keras.layers.MultiHeadAttention
    category: transformer
    since: "2.4"

  - name: tf.keras.layers.Attention
    category: transformer
