framework: pytorch
description: "PyTorch 常用算子目录（torch >= 1.0）"

# 字段说明：
#   name         算子的完整 Python API 路径（字符串）
#   category     算子分类（见下方分类表）
#   since        首次引入该算子的 PyTorch 版本（"major.minor"）
#   deprecated   标记废弃的起始版本（可选）
#   removed      正式移除的版本（可选）
#   aliases      其他等价 API 路径（可选列表）
#   note         补充说明（可选）
#
# 分类（category）：
#   activation       激活函数
#   normalization    归一化层
#   pooling          池化层
#   convolution      卷积层
#   linear           线性/全连接层
#   recurrent        循环神经网络层
#   loss             损失函数
#   dropout          Dropout 类
#   embedding        嵌入层
#   transformer      Transformer 系列
#   math             逐元素/矩阵数学运算
#   tensor_ops       张量操作（拼接、切分、变形等）
#   sparse           稀疏张量运算
#   distance         距离 / 相似度度量


last_updated: "2026-04-04"

