task_id: get_operator_list
description: >
  获取深度学习框架指定版本的完整算子目录，包括算子名称列表和对应的文档 URL。
  算子名称应使用框架的标准 API 名称（如 torch.nn.functional.relu、tf.nn.relu）。

inputs:
  - name: framework
    type: string
    description: "框架名称: pytorch, tensorflow, paddlepaddle"
  - name: version
    type: string
    description: "框架版本号，如 2.5.1；stable 表示最新稳定版"

output_schema:
  operators:
    type: array
    description: "算子名称列表（标准 API 全名）"
    items:
      type: string
  doc_urls:
    type: object
    description: "算子名 -> 文档 URL 的映射字典"
  total_count:
    type: integer
    description: "算子总数"
  version:
    type: string
    description: "实际获取到的版本号"

entry_points:
  pytorch: "https://docs.pytorch.org/docs/{version}/torch.html"
  pytorch_stable: "https://docs.pytorch.org/docs/stable/torch.html"
  pytorch_nn: "https://docs.pytorch.org/docs/stable/nn.html"
  pytorch_nn_functional: "https://docs.pytorch.org/docs/stable/nn.functional.html"
  tensorflow: "https://www.tensorflow.org/api_docs/python/tf"
  paddlepaddle: "https://www.paddlepaddle.org.cn/documentation/docs/zh/api/index_cn.html"

hints:
  - "先从 entry_point 对应的文档索引页开始"
  - "使用 extract_links 提取所有 API 链接，注意过滤掉非算子链接（如教程、示例页面）"
  - "对于 PyTorch，主要关注 torch.*, torch.nn.*, torch.nn.functional.* 命名空间"
  - "对于 TensorFlow，主要关注 tf.*, tf.nn.*, tf.keras.layers.* 命名空间"
  - "对于 PaddlePaddle，主要关注 paddle.* 命名空间"
  - "算子数量可能很多（100-500个），不需要访问每个算子的详细页面，只需收集名称和 URL"
  - "如果页面有多个分类（如 torch.nn 和 torch.nn.functional），可以分别访问并合并"
  - "完成后调用 finish 工具，operators 列表应至少包含 20 个常见算子"

max_steps: 20
cache_ttl_days: 7
