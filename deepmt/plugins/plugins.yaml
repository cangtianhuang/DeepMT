# 插件注册表：仅此处注册的插件才会被加载
# 将框架适配代码放入 deepmt/plugins/，然后在此处声明即可启用
#
# 字段说明：
#   name   — 框架标识符（与 FrameworkType 值保持一致，全小写）
#   module — Python 模块路径
#   class  — 插件类名

plugins:
  - name: pytorch
    module: deepmt.plugins.pytorch_plugin
    class: PyTorchPlugin

  # 其他框架暂未实现，取消注释前需先编写对应插件类
  # - name: tensorflow
  #   module: deepmt.plugins.tensorflow_plugin
  #   class: TensorFlowPlugin

  - name: paddlepaddle
    module: deepmt.plugins.paddle_plugin
    class: PaddlePlugin
