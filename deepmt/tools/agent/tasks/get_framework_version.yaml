task_id: get_framework_version
description: >
  获取深度学习框架的最新稳定版本号、发布日期和发布页链接。
  版本号应为完整的语义化版本（如 2.5.1），不包含 "v" 前缀。

inputs:
  - name: framework
    type: string
    description: "框架名称，枚举值之一: pytorch, tensorflow, paddlepaddle"

output_schema:
  version:
    type: string
    description: "最新稳定版本号，如 2.5.1"
  release_date:
    type: string
    description: "发布日期，格式 YYYY-MM-DD；若无法获取则为空字符串"
  release_url:
    type: string
    description: "该版本的 release 页面链接"

entry_points:
  pytorch: "https://github.com/pytorch/pytorch/releases"
  tensorflow: "https://github.com/tensorflow/tensorflow/releases"
  paddlepaddle: "https://github.com/PaddlePaddle/Paddle/releases"

hints:
  - "打开对应框架的 entry_point URL（GitHub releases 页面）"
  - "找到标记为 'Latest' 的 release，提取版本号（去掉开头的 v）"
  - "提取发布日期（格式转为 YYYY-MM-DD）"
  - "注意：只要最新的 stable release，忽略 pre-release、rc、alpha、beta 版本"
  - "如果 GitHub 页面内容不够清晰，可以使用 find_version_tags 工具辅助提取版本号"

max_steps: 8
cache_ttl_days: 3
