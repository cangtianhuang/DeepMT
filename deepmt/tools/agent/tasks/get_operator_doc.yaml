task_id: get_operator_doc
description: >
  获取深度学习框架中指定算子的完整文档内容，包括函数签名、参数说明、返回值说明和示例代码。
  返回纯文本格式，内容要求完整、准确，直接来自官方文档。

inputs:
  - name: operator_name
    type: string
    description: "算子名称，如 relu, conv2d, batch_norm"
  - name: framework
    type: string
    description: "框架名称: pytorch, tensorflow, paddlepaddle"

output_schema:
  doc:
    type: string
    description: "算子的完整文档纯文本，包含签名、参数、返回值、示例"
  source_url:
    type: string
    description: "文档来源 URL"
  operator_name:
    type: string
    description: "标准化后的算子名称"

entry_points:
  pytorch_search: "https://docs.pytorch.org/docs/stable/search.html"
  pytorch_index: "https://docs.pytorch.org/docs/stable/torch.html"
  tensorflow_search: "https://www.tensorflow.org/api_docs/python/tf"
  paddlepaddle_search: "https://www.paddlepaddle.org.cn/documentation/docs/zh/api/index_cn.html"

hints:
  - "从搜索页或索引页开始，查找与 operator_name 匹配的文档链接"
  - "对于 PyTorch，可以直接尝试构造文档 URL：https://docs.pytorch.org/docs/stable/generated/torch.nn.{OperatorName}.html"
  - "或者从 https://docs.pytorch.org/docs/stable/torch.html 搜索算子名"
  - "找到文档页后，使用 fetch_page 获取内容，重点提取：函数签名、Parameters 部分、Returns 部分、示例代码"
  - "如果第一个 URL 访问失败（404），尝试其他命名空间，如 torch.nn.functional.{name}"
  - "文档内容应包含实际的参数说明，不要只返回标题"

max_steps: 10
cache_ttl_days: 14
