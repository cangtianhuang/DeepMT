{% extends "base.html" %}
{% block title %}终端 — DeepMT{% endblock %}

{% block extra_head %}
<style>
/* ── Terminal page: 全屏铺满，隐藏 footer ──────────────────────────────── */
body { overflow: hidden; }
footer { display: none !important; }

.page-content {
  height: calc(100vh - var(--nav-h));
  display: flex; flex-direction: column; overflow: hidden;
  padding-top: var(--nav-h);
}

/* ── Root layout ─────────────────────────────────────────────────────── */
.term-layout { display: flex; flex: 1; overflow: hidden; }

/* ══════════════ SIDEBAR ══════════════════════════════════════════════ */
.term-sidebar {
  width: 248px; flex-shrink: 0;
  border-right: 1px solid var(--border);
  background: var(--surface);
  overflow-y: auto; overflow-x: hidden;
  padding: .9rem .75rem;
  scrollbar-width: thin;
}
.term-sidebar::-webkit-scrollbar { width: 3px; }
.term-sidebar::-webkit-scrollbar-thumb { background: var(--surface-3); }

.cmd-section { margin-bottom: .9rem; }
.cmd-section-title {
  font-size: .6rem; font-weight: 700; letter-spacing: .12em;
  text-transform: uppercase; color: var(--text-dim);
  margin-bottom: .4rem; padding-bottom: .3rem;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: .4rem;
}
.cmd-btn {
  display: flex; align-items: flex-start; gap: .45rem;
  width: 100%; text-align: left;
  background: transparent; border: 1px solid transparent;
  border-radius: var(--radius-sm);
  padding: .32rem .5rem; margin-bottom: .15rem;
  cursor: pointer; transition: var(--transition);
  color: var(--text-dim);
  font-size: .75rem; font-family: var(--font-mono);
  line-height: 1.5; word-break: break-all;
}
.cmd-btn:hover {
  background: var(--primary-dim); border-color: var(--border); color: var(--text);
}
.cmd-btn:active { background: rgba(77,139,255,.18); }
.cmd-btn .cmd-icon { margin-top: 1px; flex-shrink: 0; font-size: .8rem; }
.cmd-btn.is-running { opacity: .4; cursor: not-allowed; }
/* Hovered btn highlight */
.cmd-btn.tooltip-active {
  background: rgba(0,229,255,.08);
  border-color: rgba(0,229,255,.22);
  color: var(--accent);
}

/* ══════════════ TOOLTIP PANEL ════════════════════════════════════════ */
#tooltipPanel {
  position: fixed;
  left: 248px;
  width: 300px;
  z-index: 8000;
  pointer-events: none;   /* 悬停在面板上不触发 mouseleave */
  opacity: 0;
  transform: translateX(-6px);
  transition: opacity .18s ease, transform .18s ease;
}
#tooltipPanel.visible {
  opacity: 1;
  transform: translateX(0);
  pointer-events: auto;
}
.tip-card {
  background: var(--surface-2);
  border: 1px solid var(--border-bright);
  border-left: 3px solid var(--accent);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg), 0 0 0 1px rgba(0,229,255,.08);
  padding: .85rem 1rem;
  font-size: .78rem;
}
.tip-cmd {
  font-family: var(--font-mono); font-size: .79rem;
  color: var(--accent); font-weight: 600;
  margin-bottom: .45rem;
}
.tip-cmd .tip-prefix { color: var(--primary); opacity: .7; }
.tip-desc { color: var(--text); line-height: 1.55; margin-bottom: .55rem; }
.tip-opts-title {
  font-size: .6rem; font-weight: 700; letter-spacing: .1em;
  text-transform: uppercase; color: var(--text-dim);
  margin-bottom: .35rem;
}
.tip-opt-row {
  display: flex; gap: .5rem; margin-bottom: .2rem; line-height: 1.4;
}
.tip-opt-flag {
  font-family: var(--font-mono); font-size: .72rem;
  color: var(--info); flex-shrink: 0; min-width: 90px;
}
.tip-opt-desc { color: var(--text-dim); font-size: .72rem; }
.tip-example {
  margin-top: .55rem; padding-top: .45rem;
  border-top: 1px solid var(--border);
  font-family: var(--font-mono); font-size: .73rem;
  color: var(--text-dim);
}
.tip-example span { color: var(--text-code); }

/* ══════════════ MAIN TERMINAL ════════════════════════════════════════ */
.term-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #030507; }

/* Header bar */
.term-header {
  flex-shrink: 0;
  background: var(--surface-2); border-bottom: 1px solid var(--border);
  padding: .5rem .9rem; display: flex; align-items: center; gap: .65rem; height: 40px;
}
.term-header-title {
  font-size: .78rem; font-weight: 700; color: var(--text); flex: 1;
  display: flex; align-items: center; gap: .45rem;
}

/* Status pip */
.term-status { display: flex; align-items: center; gap: .4rem; font-size: .7rem; color: var(--text-dim); }
.term-status-dot {
  width: 7px; height: 7px; border-radius: 50%; background: var(--text-dim);
  transition: background .3s ease, box-shadow .3s ease;
}
.term-status-dot.connected  { background: var(--success); box-shadow: 0 0 8px var(--success-glow); animation: pipBlink 2.6s ease-in-out infinite; }
.term-status-dot.running    { background: var(--warning); box-shadow: 0 0 8px var(--warning-glow); animation: pipBlink .9s ease-in-out infinite; }
.term-status-dot.error      { background: var(--danger);  box-shadow: 0 0 8px var(--danger-glow); }

/* Output area */
.term-output {
  flex: 1; overflow-y: auto; overflow-x: auto;
  padding: .85rem 1.1rem 1rem;
  font-family: var(--font-mono); font-size: .81rem; line-height: 1.72;
  color: var(--text-code); scrollbar-width: thin;
}
.term-output::-webkit-scrollbar { width: 4px; height: 4px; }
.term-output::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 99px; }

.term-line { white-space: pre-wrap; word-break: break-all; }
.term-prompt-line { margin-top: .7rem; }
.term-done-line   { margin-bottom: .55rem; font-size: .7rem; opacity: .65; }
.term-sys-line    { color: var(--text-dim); font-style: italic; }

/* Welcome */
.term-welcome {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; color: var(--text-dim); gap: .4rem;
  pointer-events: none; user-select: none;
}
.term-welcome-icon { font-size: 2.8rem; opacity: .12; margin-bottom: .3rem; }
.term-welcome-title { font-size: .9rem; color: var(--text-dim); opacity: .7; }
.term-welcome-sub   { font-size: .72rem; color: var(--text-dim); opacity: .45; }

/* ══════════════ AUTOCOMPLETE DROPDOWN ════════════════════════════════ */
.ac-wrap { position: relative; flex: 1; display: flex; align-items: center; }

#acDropdown {
  position: absolute; bottom: calc(100% + 8px); left: -56px;
  width: calc(100% + 120px);
  background: var(--surface-2);
  border: 1px solid var(--border-bright);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  overflow: hidden;
  display: none;
  z-index: 7000;
  max-height: 320px; overflow-y: auto;
}
#acDropdown.open { display: block; animation: revealUp .14s ease both; }
#acDropdown::-webkit-scrollbar { width: 3px; }
#acDropdown::-webkit-scrollbar-thumb { background: var(--surface-3); }

.ac-item {
  display: flex; align-items: baseline; gap: .65rem;
  padding: .45rem .75rem; cursor: pointer;
  transition: background .12s ease;
  border-left: 2px solid transparent;
}
.ac-item:hover, .ac-item.focused {
  background: var(--primary-dim);
  border-left-color: var(--primary);
}
.ac-item-cmd {
  font-family: var(--font-mono); font-size: .78rem;
  color: var(--text); white-space: nowrap; min-width: 0;
  flex-shrink: 0;
}
.ac-item-cmd .ac-match { color: var(--accent); }
.ac-item-desc {
  font-size: .72rem; color: var(--text-dim);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.ac-kbd {
  margin-left: auto; flex-shrink: 0;
  font-size: .62rem; color: var(--text-dim);
  background: var(--surface-3); border: 1px solid var(--border);
  border-radius: 4px; padding: 0 5px; line-height: 1.7;
}

/* ══════════════ INPUT BAR ════════════════════════════════════════════ */
.term-input-bar {
  flex-shrink: 0; background: var(--surface-2); border-top: 1px solid var(--border);
  padding: .55rem .9rem; display: flex; align-items: center; gap: .6rem; height: 46px;
}
.term-prompt-label { font-family: var(--font-mono); font-size: .8rem; color: var(--accent); white-space: nowrap; user-select: none; opacity: .85; }
.term-prompt-sep   { color: var(--border-bright); font-family: var(--font-mono); font-size: .9rem; user-select: none; }
.term-input {
  flex: 1; background: transparent; border: none; outline: none;
  font-family: var(--font-mono); font-size: .8rem;
  color: var(--text-bright); caret-color: var(--accent);
}
.term-input::placeholder { color: var(--text-dim); opacity: .55; }
.term-input:disabled { opacity: .4; }

/* Buttons */
.term-btn {
  background: transparent; cursor: pointer; transition: var(--transition);
  border-radius: var(--radius-sm); padding: .22rem .6rem;
  font-size: .72rem; display: flex; align-items: center; gap: .3rem; white-space: nowrap;
}
.term-btn-clear { border: 1px solid var(--border); color: var(--text-dim); }
.term-btn-clear:hover { border-color: var(--border-bright); color: var(--text); background: var(--surface-3); }
.term-btn-kill  { border: 1px solid rgba(255,82,82,.35); color: var(--danger); display: none; }
.term-btn-kill:hover { background: var(--danger-dim); border-color: var(--danger); }
.term-btn-run   { border: 1px solid rgba(77,139,255,.35); color: var(--primary); background: var(--primary-dim); font-weight: 600; padding: .22rem .8rem; }
.term-btn-run:hover { background: rgba(77,139,255,.2); border-color: var(--primary); box-shadow: 0 0 12px rgba(77,139,255,.18); }
.term-btn-run:disabled { opacity: .38; cursor: not-allowed; pointer-events: none; }

.term-hd-sep { width: 1px; height: 14px; background: var(--border); flex-shrink: 0; }

/* Responsive */
@media (max-width: 900px) { .term-sidebar { display: none !important; } }
</style>
{% endblock %}

{% block content %}
<div class="term-layout">

  <!-- ══════════════════════ SIDEBAR ════════════════════════════════════ -->
  <aside class="term-sidebar" id="termSidebar">
    <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.8rem;padding-bottom:.5rem;border-bottom:1px solid var(--border);">
      <i class="bi bi-terminal-fill" style="color:var(--accent);font-size:.9rem;"></i>
      <span style="font-size:.75rem;font-weight:700;color:var(--text);">快捷命令</span>
      <span style="margin-left:auto;font-size:.62rem;color:var(--text-dim);">悬停查看详情</span>
    </div>

    <div class="cmd-section">
      <div class="cmd-section-title"><i class="bi bi-heart-pulse-fill" style="color:var(--success);"></i>系统</div>
      <button class="cmd-btn" data-cmd="health check" onclick="runCmd('health check')"><span class="cmd-icon" style="color:var(--success);">✓</span>health check</button>
      <button class="cmd-btn" data-cmd="health check --deep" onclick="runCmd('health check --deep')"><span class="cmd-icon" style="color:var(--success);">✓</span>health check --deep</button>
      <button class="cmd-btn" data-cmd="health matrix" onclick="runCmd('health matrix')"><span class="cmd-icon" style="color:var(--info);">▦</span>health matrix</button>
    </div>

    <div class="cmd-section">
      <div class="cmd-section-title"><i class="bi bi-list-ul" style="color:var(--primary);"></i>算子目录</div>
      <button class="cmd-btn" data-cmd="catalog list" onclick="runCmd('catalog list --framework pytorch --category activation')"><span class="cmd-icon" style="color:var(--primary);">›</span>catalog list --category activation</button>
      <button class="cmd-btn" data-cmd="catalog info <operator>" onclick="runCmd('catalog info relu')"><span class="cmd-icon" style="color:var(--primary);">›</span>catalog info relu</button>
      <button class="cmd-btn" data-cmd="catalog search <keyword>" onclick="runCmd('catalog search relu')"><span class="cmd-icon" style="color:var(--primary);">›</span>catalog search relu</button>
    </div>

    <div class="cmd-section">
      <div class="cmd-section-title"><i class="bi bi-cpu" style="color:var(--c-rq1);"></i>MR 生成</div>
      <button class="cmd-btn" data-cmd="mr generate <operator>" onclick="runCmd('mr generate relu --sources template --precheck --save')"><span class="cmd-icon" style="color:var(--c-rq1);">⚙</span>mr generate relu --save</button>
      <button class="cmd-btn" data-cmd="mr generate <operator>" onclick="runCmd('mr generate exp --sources template --precheck --save')"><span class="cmd-icon" style="color:var(--c-rq1);">⚙</span>mr generate exp --save</button>
      <button class="cmd-btn" data-cmd="mr batch-generate" onclick="runCmd('mr batch-generate --framework pytorch --limit 5')"><span class="cmd-icon" style="color:var(--c-rq1);">⚙</span>mr batch-generate --limit 5</button>
      <button class="cmd-btn" data-cmd="mr batch-generate" onclick="runCmd('mr batch-generate --dry-run')"><span class="cmd-icon" style="color:var(--text-dim);">›</span>mr batch-generate --dry-run</button>
      <button class="cmd-btn" data-cmd="mr model-generate" onclick="runCmd('mr model-generate --all')"><span class="cmd-icon" style="color:var(--c-rq2);">◈</span>mr model-generate --all</button>
    </div>

    <div class="cmd-section">
      <div class="cmd-section-title"><i class="bi bi-database" style="color:var(--c-rq3);"></i>知识库</div>
      <button class="cmd-btn" data-cmd="repo stats" onclick="runCmd('repo stats')"><span class="cmd-icon" style="color:var(--c-rq3);">≡</span>repo stats</button>
      <button class="cmd-btn" data-cmd="repo stats" onclick="runCmd('repo stats --all-layers')"><span class="cmd-icon" style="color:var(--c-rq3);">≡</span>repo stats --all-layers</button>
      <button class="cmd-btn" data-cmd="repo list" onclick="runCmd('repo list')"><span class="cmd-icon" style="color:var(--c-rq3);">›</span>repo list</button>
      <button class="cmd-btn" data-cmd="repo audit" onclick="runCmd('repo audit')"><span class="cmd-icon" style="color:var(--c-rq4);">⬡</span>repo audit</button>
    </div>

    <div class="cmd-section">
      <div class="cmd-section-title"><i class="bi bi-play-fill" style="color:var(--success);"></i>测试执行</div>
      <button class="cmd-btn" data-cmd="test batch" onclick="runCmd('test batch --framework pytorch --n-samples 10')"><span class="cmd-icon" style="color:var(--success);">▶</span>test batch --n-samples 10</button>
      <button class="cmd-btn" data-cmd="test open" onclick="runCmd('test open --inject-faults all --n-samples 10 --collect-evidence')"><span class="cmd-icon" style="color:var(--danger);">⚡</span>test open --inject-faults all</button>
      <button class="cmd-btn" data-cmd="test cross <operator>" onclick="runCmd('test cross torch.nn.functional.relu --save')"><span class="cmd-icon" style="color:var(--info);">↔</span>test cross relu --save</button>
      <button class="cmd-btn" data-cmd="test model" onclick="runCmd('test model --all')"><span class="cmd-icon" style="color:var(--c-rq2);">◈</span>test model --all</button>
    </div>

    <div class="cmd-section">
      <div class="cmd-section-title"><i class="bi bi-file-earmark-bar-graph" style="color:var(--c-rq4);"></i>报告 &amp; 证据</div>
      <button class="cmd-btn" data-cmd="test report" onclick="runCmd('test report')"><span class="cmd-icon" style="color:var(--c-rq4);">📊</span>test report</button>
      <button class="cmd-btn" data-cmd="test failures" onclick="runCmd('test failures --limit 10')"><span class="cmd-icon" style="color:var(--danger);">✗</span>test failures --limit 10</button>
      <button class="cmd-btn" data-cmd="test evidence list" onclick="runCmd('test evidence list')"><span class="cmd-icon" style="color:var(--info);">📁</span>test evidence list</button>
      <button class="cmd-btn" data-cmd="case list" onclick="runCmd('case list')"><span class="cmd-icon" style="color:var(--danger);">🐛</span>case list</button>
    </div>

    <div class="cmd-section">
      <div class="cmd-section-title"><i class="bi bi-graph-up" style="color:var(--c-rq2);"></i>实验数据</div>
      <button class="cmd-btn" data-cmd="experiment collect" onclick="runCmd('experiment collect')"><span class="cmd-icon" style="color:var(--c-rq2);">≈</span>experiment collect</button>
      <button class="cmd-btn" data-cmd="experiment env" onclick="runCmd('experiment env')"><span class="cmd-icon" style="color:var(--text-dim);">ℹ</span>experiment env</button>
      <button class="cmd-btn" data-cmd="experiment benchmark" onclick="runCmd('experiment benchmark')"><span class="cmd-icon" style="color:var(--c-rq1);">▣</span>experiment benchmark</button>
    </div>

    <div class="cmd-section">
      <div class="cmd-section-title"><i class="bi bi-trash" style="color:var(--text-dim);"></i>数据清理</div>
      <button class="cmd-btn" data-cmd="data clean-logs" onclick="runCmd('data clean-logs -y')"><span class="cmd-icon" style="color:var(--warning);">🗑</span>data clean-logs -y</button>
    </div>
  </aside>

  <!-- ══════════════════════ TOOLTIP PANEL ══════════════════════════════ -->
  <div id="tooltipPanel">
    <div class="tip-card" id="tipCard"></div>
  </div>

  <!-- ══════════════════════ TERMINAL MAIN ══════════════════════════════ -->
  <div class="term-main">

    <!-- Header -->
    <div class="term-header">
      <div class="term-header-title">
        <i class="bi bi-terminal" style="color:var(--accent);"></i>DeepMT 终端
      </div>
      <div class="term-status">
        <div class="term-status-dot" id="statusDot"></div>
        <span id="statusText" style="min-width:3rem;">未连接</span>
      </div>
      <div class="term-hd-sep"></div>
      <button class="term-btn term-btn-clear" onclick="clearOutput()" title="清空 (Ctrl+L)">
        <i class="bi bi-eraser"></i>清空
      </button>
      <button class="term-btn term-btn-kill" id="killBtn" onclick="killProcess()" title="中断 (Ctrl+C)">
        <i class="bi bi-stop-fill"></i>中断
      </button>
    </div>

    <!-- Output -->
    <div class="term-output" id="termOutput">
      <div class="term-welcome" id="termWelcome">
        <div class="term-welcome-icon"><i class="bi bi-terminal-fill"></i></div>
        <div class="term-welcome-title">DeepMT 命令终端</div>
        <div class="term-welcome-sub">从左侧选择命令，或在下方输入子命令后按 Enter</div>
      </div>
    </div>

    <!-- Input bar -->
    <div class="term-input-bar">
      <span class="term-prompt-label">deepmt</span>
      <span class="term-prompt-sep">›</span>
      <!-- autocomplete wrapper -->
      <div class="ac-wrap">
        <input
          type="text" id="termInput" class="term-input"
          placeholder="输入子命令…" autocomplete="off" autocorrect="off" spellcheck="false"
        >
        <!-- dropdown renders here -->
        <div id="acDropdown"></div>
      </div>
      <button class="term-btn term-btn-run" id="runBtn" onclick="submitCommand()">
        <i class="bi bi-send-fill" style="font-size:.7rem;"></i>运行
      </button>
    </div>

  </div><!-- /term-main -->
</div><!-- /term-layout -->
{% endblock %}

{% block extra_scripts %}
<script>
/* ════════════════════════════════════════════════════════════════════════
   DeepMT Terminal  ·  WebSocket + Autocomplete + Tooltip
   ════════════════════════════════════════════════════════════════════════ */

/* ── DOM refs ──────────────────────────────────────────────────────────── */
const $output    = document.getElementById('termOutput');
const $input     = document.getElementById('termInput');
const $runBtn    = document.getElementById('runBtn');
const $killBtn   = document.getElementById('killBtn');
const $statusDot = document.getElementById('statusDot');
const $statusTxt = document.getElementById('statusText');
const $acDrop    = document.getElementById('acDropdown');
const $tipPanel  = document.getElementById('tooltipPanel');
const $tipCard   = document.getElementById('tipCard');

/* ════════════════════════════════════════════════════════════════════════
   COMMAND DATA  — 全量 deepmt 命令字典
   ════════════════════════════════════════════════════════════════════════ */
const CMDS = [
  /* health */
  { cmd:'health check',        desc:'逐一检查所有核心模块，输出通过/警告/错误统计；报告头部含框架版本矩阵',
    opts:[{f:'--deep',d:'追加插件契约 + 算子↔插件可达性 + 目录对账检测'}],
    ex:'health check --deep' },
  { cmd:'health matrix',       desc:'输出"算子 × 框架"可达性矩阵（基于知识库算子与已注册插件）',
    opts:[{f:'--json',d:'JSON 格式输出'}], ex:'health matrix' },
  { cmd:'health progress',     desc:'显示各模块开发进度百分比（进度条可视化）',
    opts:[], ex:'health progress' },
  { cmd:'health all',          desc:'同时运行进度报告与健康检查（等价于依次执行上面两条命令）',
    opts:[], ex:'health all' },

  /* catalog */
  { cmd:'catalog list',        desc:'列出框架算子目录，支持按分类 / 关键字筛选',
    opts:[{f:'--framework <fw>',d:'pytorch / tensorflow / paddlepaddle'},{f:'--category <cat>',d:'activation / math / pooling / convolution…'},{f:'--search <kw>',d:'名称关键字模糊过滤'},{f:'--count-only',d:'仅输出匹配数量'},{f:'--json',d:'JSON 格式输出'}],
    ex:'catalog list --framework pytorch --category activation' },
  { cmd:'catalog search <keyword>', desc:'跨所有框架模糊搜索算子（匹配名称及别名）',
    opts:[{f:'--json',d:'JSON 格式输出'}], ex:'catalog search relu' },
  { cmd:'catalog info <operator>', desc:'查询算子的跨框架分布 + 知识库 MR 数量联合视图',
    opts:[{f:'--json',d:'JSON 格式输出'}], ex:'catalog info relu' },
  { cmd:'catalog latest-version', desc:'从 PyPI 获取框架最新/历史版本号（无需 LLM，纯 HTTP）',
    opts:[{f:'--framework <fw>',d:'目标框架'},{f:'--all-versions',d:'列出所有历史版本（最多 20 条）'},{f:'--json',d:'JSON 格式输出'}],

/* ════════════════════════════════════════════════════════════════════════
   AUTOCOMPLETE
   ════════════════════════════════════════════════════════════════════════ */
let acFocused = -1;   // 当前高亮条目索引
let acItems   = [];   // 当前展示的条目

function escH(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/** 根据输入值过滤并渲染下拉列表 */
function acUpdate(val) {
  const q = val.trim().toLowerCase();
  $acDrop.innerHTML = '';
  acFocused = -1;

  if (!q) { acClose(); return; }

  // 优先：以 q 开头；次之：包含 q
  const starts = CMDS.filter(c => c.cmd.toLowerCase().startsWith(q));
  const contains = CMDS.filter(c => !c.cmd.toLowerCase().startsWith(q) && c.cmd.toLowerCase().includes(q));
  acItems = [...starts, ...contains].slice(0, 9);

  if (!acItems.length) { acClose(); return; }

  acItems.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'ac-item';
    div.dataset.idx = i;

    // 高亮匹配部分
    const cmdLow = item.cmd.toLowerCase();
    const pos = cmdLow.indexOf(q);
    let highlighted;
    if (pos >= 0) {
      highlighted =
        escH(item.cmd.slice(0, pos)) +
        `<span class="ac-match">${escH(item.cmd.slice(pos, pos + q.length))}</span>` +
        escH(item.cmd.slice(pos + q.length));
    } else {
      highlighted = escH(item.cmd);
    }

    const isFirst = i === 0;
    div.innerHTML =
      `<span class="ac-item-cmd">${highlighted}</span>` +
      `<span class="ac-item-desc">${escH(item.desc.slice(0, 40))}…</span>` +
      (isFirst ? `<span class="ac-kbd">Tab</span>` : '');

    div.addEventListener('mousedown', (e) => {
      e.preventDefault();
      acSelect(i);
    });
    $acDrop.appendChild(div);
  });

  $acDrop.classList.add('open');
}

function acClose() {
  $acDrop.classList.remove('open');
  acFocused = -1;
  acItems   = [];
}

/** 选中某个条目（填入输入框，不提交） */
function acSelect(idx) {
  const item = acItems[idx];
  if (!item) return;
  // 填入命令（去掉 <placeholder> 部分，保留到第一个 < 前）
  const clean = item.cmd.replace(/<[^>]+>/g, '').trim();
  $input.value = clean + ' ';
  acClose();
  $input.focus();
}

/** 键盘在下拉中导航 */
function acMoveFocus(dir) {
  const total = $acDrop.querySelectorAll('.ac-item').length;
  if (!total) return;
  acFocused = (acFocused + dir + total) % total;
  $acDrop.querySelectorAll('.ac-item').forEach((el, i) => {
    el.classList.toggle('focused', i === acFocused);
  });
}

/* ════════════════════════════════════════════════════════════════════════
   TOOLTIP  (侧边栏悬浮说明)
   ════════════════════════════════════════════════════════════════════════ */
let _tipTimer   = null;
let _activeTipBtn = null;  // 当前触发 tooltip 的按钮

function _clearActiveBtn() {
  if (_activeTipBtn) {
    _activeTipBtn.classList.remove('tooltip-active');
    _activeTipBtn = null;
  }
}

function tipShow(btn) {
  const key = btn.dataset.cmd;
  if (!key) return;

  // 精确匹配 > 前缀匹配
  let info = CMDS.find(c => c.cmd === key)
          || CMDS.find(c => c.cmd.startsWith(key.split(' ')[0]));
  if (!info) return;

  // 先清除旧的高亮（无论是哪个按钮）
  _clearActiveBtn();
  _activeTipBtn = btn;
  btn.classList.add('tooltip-active');

  // 渲染 tip card
  const optsHtml = info.opts.length
    ? `<div class="tip-opts-title">OPTIONS</div>` +
      info.opts.map(o =>
        `<div class="tip-opt-row">
           <span class="tip-opt-flag">${escH(o.f)}</span>
           <span class="tip-opt-desc">${escH(o.d)}</span>
         </div>`
      ).join('')
    : '';

  $tipCard.innerHTML =
    `<div class="tip-cmd">
       <span class="tip-prefix">deepmt </span>${escH(info.cmd)}
     </div>
     <div class="tip-desc">${escH(info.desc)}</div>
     ${optsHtml}
     <div class="tip-example">
       <span style="color:var(--text-dim)">$ deepmt </span><span>${escH(info.ex)}</span>
     </div>`;

  // 定位：与按钮垂直居中，贴着侧边栏右侧
  const rect = btn.getBoundingClientRect();
  const panelH = $tipPanel.offsetHeight || 200;
  let top = rect.top + rect.height / 2 - panelH / 2;
  // 边界夹紧
  top = Math.max(60, Math.min(top, window.innerHeight - panelH - 12));
  $tipPanel.style.top = top + 'px';
  $tipPanel.classList.add('visible');
}

function tipHide() {
  $tipPanel.classList.remove('visible');
  _clearActiveBtn();
}

// 绑定所有 cmd-btn 的 hover 事件
document.querySelectorAll('.cmd-btn[data-cmd]').forEach(btn => {
  btn.addEventListener('mouseenter', () => {
    clearTimeout(_tipTimer);
    _tipTimer = setTimeout(() => tipShow(btn), 120);
  });
  btn.addEventListener('mouseleave', () => {
    clearTimeout(_tipTimer);
    _tipTimer = setTimeout(tipHide, 180);
  });
});

// 鼠标进入 tooltip panel 时保持显示
$tipPanel.addEventListener('mouseenter', () => clearTimeout(_tipTimer));
$tipPanel.addEventListener('mouseleave', () => {
  _tipTimer = setTimeout(tipHide, 180);
});

/* ════════════════════════════════════════════════════════════════════════
   STATUS & RUNNING STATE
   ════════════════════════════════════════════════════════════════════════ */
let isRunning = false;

function setStatus(state) {
  $statusDot.className = 'term-status-dot';
  if (['connected','running','error'].includes(state)) $statusDot.classList.add(state);
  $statusTxt.textContent = {
    connecting:'连接中…', connected:'已连接',
    running:'运行中…', error:'错误', disconnected:'未连接',
  }[state] || '未连接';
}

function setRunning(flag) {
  isRunning = flag;
  setStatus(flag ? 'running' : 'connected');
  $runBtn.disabled = flag;
  $killBtn.style.display = flag ? 'flex' : 'none';
  $input.disabled = flag;
  $input.placeholder = flag ? '命令运行中，Ctrl+C 可中断…' : '输入子命令…';
  document.querySelectorAll('.cmd-btn').forEach(b => b.classList.toggle('is-running', flag));
}

/* ════════════════════════════════════════════════════════════════════════
   OUTPUT
   ════════════════════════════════════════════════════════════════════════ */
function hideWelcome() {
  const w = document.getElementById('termWelcome');
  if (w) w.remove();
}

function appendHtml(html, cls = '') {
  hideWelcome();
  const div = document.createElement('div');
  div.className = 'term-line' + (cls ? ' ' + cls : '');
  if (!html) div.style.height = '.22em'; else div.innerHTML = html;
  $output.appendChild(div);
  $output.scrollTop = $output.scrollHeight;
}

function appendPrompt(subCmd) {
  hideWelcome();
  const div = document.createElement('div');
  div.className = 'term-line term-prompt-line';
  div.innerHTML =
    `<span style="color:var(--accent);opacity:.6">$ </span>` +
    `<span style="color:var(--primary);font-weight:600">deepmt</span>` +
    ` <span style="color:var(--text-bright)">${escH(subCmd)}</span>`;
  $output.appendChild(div);
  $output.scrollTop = $output.scrollHeight;
}

function appendDone(code) {
  const div = document.createElement('div');
  div.className = 'term-line term-done-line';
  div.innerHTML = code === 0
    ? `<span style="color:var(--success)">✓ 完成（退出码 0）</span>`
    : `<span style="color:var(--danger)">✗ 退出码 ${code}</span>`;
  $output.appendChild(div);
  $output.scrollTop = $output.scrollHeight;
}

function clearOutput() {
  $output.innerHTML = `
    <div class="term-welcome" id="termWelcome">
      <div class="term-welcome-icon"><i class="bi bi-terminal-fill"></i></div>
      <div class="term-welcome-title">DeepMT 命令终端</div>
      <div class="term-welcome-sub">从左侧选择命令，或在下方输入子命令后按 Enter</div>
    </div>`;
}

/* ════════════════════════════════════════════════════════════════════════
   WEBSOCKET
   ════════════════════════════════════════════════════════════════════════ */
let ws = null;
let _reconnTimer = null;

function connect() {
  if (ws && ws.readyState <= 1) return;
  clearTimeout(_reconnTimer);
  setStatus('connecting');
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/terminal/ws`);

  ws.onopen = () => {
    setStatus('connected');
    showToast('终端已连接', 'success');
    $input.focus();
  };
  ws.onclose = () => {
    setStatus('disconnected');
    if (isRunning) { setRunning(false); appendHtml('<span style="color:var(--warning)">连接已断开</span>', 'term-sys-line'); }
    _reconnTimer = setTimeout(connect, 3000);
  };
  ws.onerror = () => setStatus('error');
  ws.onmessage = ({ data }) => {
    let msg; try { msg = JSON.parse(data); } catch { return; }
    switch (msg.type) {
      case 'start':  appendPrompt(msg.cmd.replace(/^deepmt\s*/,'')); break;
      case 'line':   appendHtml(msg.html || ''); break;
      case 'done':   appendDone(msg.code); setRunning(false); $input.focus(); break;
      case 'killed': appendHtml('<span style="color:var(--warning)">⚡ 命令已中断</span>', 'term-sys-line'); setRunning(false); $input.focus(); break;
      case 'error':  appendHtml(`<span style="color:var(--danger)">✗ ${escH(msg.msg||'未知错误')}</span>`, 'term-sys-line'); setRunning(false); break;
      case 'ping':   ws.send(JSON.stringify({type:'pong'})); break;
    }
  };
}

function _wsSend(p) { if (ws?.readyState === WebSocket.OPEN) ws.send(JSON.stringify(p)); }

/* ════════════════════════════════════════════════════════════════════════
   COMMAND SUBMISSION & HISTORY
   ════════════════════════════════════════════════════════════════════════ */
let cmdHistory = [];
let histIdx    = -1;

function submitCommand() {
  if (isRunning) return;
  if (!ws || ws.readyState !== WebSocket.OPEN) { showToast('终端未连接，请稍候', 'info'); return; }
  const raw = $input.value.trim();
  if (!raw) return;
  if (cmdHistory[0] !== raw) cmdHistory.unshift(raw);
  if (cmdHistory.length > 80) cmdHistory.pop();
  histIdx = -1;
  $input.value = '';
  acClose();
  _wsSend({ type:'run', cmd: raw });
  setRunning(true);
}

function killProcess() { _wsSend({ type:'kill' }); }

function runCmd(subCmd) {
  if (isRunning) { showToast('请等待当前命令完成', 'info'); return; }
  $input.value = subCmd;
  submitCommand();
}

/* ════════════════════════════════════════════════════════════════════════
   KEYBOARD
   ════════════════════════════════════════════════════════════════════════ */
$input.addEventListener('input', () => acUpdate($input.value));

$input.addEventListener('keydown', (e) => {
  // 下拉框开着时的导航
  if ($acDrop.classList.contains('open')) {
    if (e.key === 'ArrowDown') { e.preventDefault(); acMoveFocus(1); return; }
    if (e.key === 'ArrowUp')   { e.preventDefault(); acMoveFocus(-1); return; }
    if (e.key === 'Tab' || (e.key === 'Enter' && acFocused >= 0)) {
      e.preventDefault();
      acSelect(acFocused >= 0 ? acFocused : 0);
      return;
    }
    if (e.key === 'Escape') { e.preventDefault(); acClose(); return; }
  }

  if (e.key === 'Enter') { e.preventDefault(); submitCommand(); }
  else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (histIdx < cmdHistory.length - 1) { histIdx++; $input.value = cmdHistory[histIdx]; }
  }
  else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (histIdx > 0) { histIdx--; $input.value = cmdHistory[histIdx]; }
    else if (histIdx === 0) { histIdx = -1; $input.value = ''; }
  }
  else if (e.key === 'c' && e.ctrlKey && isRunning) { e.preventDefault(); killProcess(); }
  else if (e.key === 'l' && e.ctrlKey) { e.preventDefault(); clearOutput(); }
});

// 点击输入框外关闭下拉
document.addEventListener('mousedown', (e) => {
  if (!$acDrop.contains(e.target) && e.target !== $input) acClose();
});

// 任意字符键聚焦输入框
document.addEventListener('keydown', (e) => {
  if (e.target === $input || e.target.tagName === 'BUTTON' || e.ctrlKey || e.metaKey || e.altKey) return;
  if (e.key.length === 1 && !isRunning) $input.focus();
});

/* ── Boot ────────────────────────────────────────────────────────────── */
connect();
</script>
{% endblock %}
