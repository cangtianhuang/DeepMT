<!DOCTYPE html>
<html lang="zh-CN" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}DeepMT Dashboard{% endblock %}</title>
  <link rel="stylesheet" href="/static/bootstrap.min.css">
  <link rel="stylesheet" href="/static/bootstrap-icons.min.css">

  <style>
    /* ═══════════════════════════════════════════════════════════════════
       DeepMT Dashboard  ·  Neon Research Lab Theme
       ═══════════════════════════════════════════════════════════════════ */

    :root {
      /* ── Backgrounds ───────────────────────────────────────────────── */
      --bg:           #020406;
      --surface:      #080d18;
      --surface-2:    #0d1525;
      --surface-3:    #141e32;
      --border:       rgba(77,139,255, 0.12);
      --border-bright:rgba(77,139,255, 0.28);

      /* ── Primary ───────────────────────────────────────────────────── */
      --primary:      #4d8bff;
      --primary-dim:  rgba(77,139,255, 0.10);
      --primary-glow: rgba(77,139,255, 0.38);
      --accent:       #00e5ff;

      /* ── RQ Colors + Glow ──────────────────────────────────────────── */
      --c-rq1:       #4d8bff;
      --c-rq1-glow:  rgba(77,139,255, 0.45);
      --c-rq2:       #ff5252;
      --c-rq2-glow:  rgba(255,82,82,  0.45);
      --c-rq3:       #00e5b0;
      --c-rq3-glow:  rgba(0,229,176,  0.45);
      --c-rq4:       #ffcc00;
      --c-rq4-glow:  rgba(255,204,0,  0.45);

      /* ── Semantic ──────────────────────────────────────────────────── */
      --success:      #00e5b0;
      --success-dim:  rgba(0,229,176, .10);
      --success-glow: rgba(0,229,176, .40);
      --danger:       #ff5252;
      --danger-dim:   rgba(255,82,82, .10);
      --danger-glow:  rgba(255,82,82, .40);
      --warning:      #ffcc00;
      --warning-dim:  rgba(255,204,0, .10);
      --warning-glow: rgba(255,204,0, .40);
      --info:         #00e5ff;
      --info-dim:     rgba(0,229,255, .10);
      --info-glow:    rgba(0,229,255, .40);

      /* ── Text ──────────────────────────────────────────────────────── */
      --text:         #c8daf0;
      --text-dim:     #3d5570;
      --text-bright:  #f0f6ff;
      --text-code:    #7ec8f4;

      /* ── Fonts ─────────────────────────────────────────────────────── */
      --font-ui:   -apple-system, "PingFang SC", "Microsoft YaHei UI",
                   "Segoe UI", "Noto Sans SC", sans-serif;
      --font-mono: "JetBrains Mono", "Fira Code", "Cascadia Code",
                   "Consolas", monospace;

      /* ── Layout ────────────────────────────────────────────────────── */
      --radius:    10px;
      --radius-sm:  6px;
      --radius-lg: 16px;
      --nav-h:     58px;

      /* ── Elevation ─────────────────────────────────────────────────── */
      --shadow:    0 4px 24px rgba(0,0,0,.60);
      --shadow-lg: 0 8px 48px rgba(0,0,0,.75);
      --transition:all .22s cubic-bezier(.4,0,.2,1);
    }

    /* ── Reset ─────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Animated background blobs ─────────────────────────────────── */
    .bg-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(110px);
      pointer-events: none;
      z-index: 0;
      will-change: transform;
    }
    .bg-blob-1 {
      width: 700px; height: 700px;
      top: -250px; left: -250px;
      background: radial-gradient(circle, rgba(77,139,255,.14) 0%, transparent 70%);
      animation: blobDrift1 28s ease-in-out infinite alternate;
    }
    .bg-blob-2 {
      width: 550px; height: 550px;
      bottom: -200px; right: -200px;
      background: radial-gradient(circle, rgba(168,85,247,.11) 0%, transparent 70%);
      animation: blobDrift2 34s ease-in-out infinite alternate;
    }
    .bg-blob-3 {
      width: 450px; height: 450px;
      top: 50%; left: 55%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(0,229,176,.07) 0%, transparent 70%);
      animation: blobDrift3 22s ease-in-out infinite alternate;
    }

    @keyframes blobDrift1 {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(50px, 40px) scale(1.12); }
    }
    @keyframes blobDrift2 {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(-40px, -50px) scale(1.09); }
    }
    @keyframes blobDrift3 {
      from { transform: translate(-50%, -50%) scale(1); }
      to   { transform: translate(-44%, -57%) scale(1.18); }
    }

    /* Subtle dot grid overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        radial-gradient(circle, rgba(77,139,255,.08) 1px, transparent 1px);
      background-size: 36px 36px;
      pointer-events: none; z-index: 0;
    }
    nav, main, footer { position: relative; z-index: 1; }

    /* ── Page progress bar ─────────────────────────────────────────── */
    #page-progress {
      position: fixed; top: 0; left: 0;
      width: 0%; height: 2px; z-index: 9999;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      box-shadow: 0 0 10px var(--primary-glow);
      transition: width .3s ease, opacity .4s ease;
      opacity: 0;
    }

    /* ── Scrollbar ─────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-bright); }

    /* ── Navbar ────────────────────────────────────────────────────── */
    .navbar {
      height: var(--nav-h);
      background: rgba(2,4,6,.88) !important;
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 0 rgba(77,139,255,.07), 0 4px 32px rgba(0,0,0,.55);
    }

    .brand-icon {
      width: 30px; height: 30px; flex-shrink: 0;
      background: linear-gradient(135deg, #1a40c0, #4d8bff);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 18px rgba(77,139,255,.50);
    }
    .brand-name {
      font-size: .95rem; font-weight: 800;
      color: var(--text-bright); letter-spacing: -.015em;
    }
    .brand-ver {
      font-family: var(--font-mono); font-size: .6rem;
      color: var(--text-dim); background: var(--surface-2);
      border: 1px solid var(--border); border-radius: 4px;
      padding: 1px 6px; letter-spacing: .01em;
    }

    .navbar .nav-link {
      font-size: .82rem; color: var(--text-dim) !important;
      padding: .3rem .75rem; border-radius: var(--radius-sm);
      transition: var(--transition);
      display: flex; align-items: center; gap: 5px;
      border: 1px solid transparent;
    }
    .navbar .nav-link:hover {
      color: var(--text) !important;
      background: rgba(77,139,255,.08);
      border-color: var(--border);
    }
    .navbar .nav-link.active {
      color: var(--primary) !important;
      background: rgba(77,139,255,.14);
      border-color: rgba(77,139,255,.28);
      box-shadow: 0 0 14px rgba(77,139,255,.18),
                  inset 0 0 8px rgba(77,139,255,.07);
    }
    .navbar .nav-link .bi { font-size: .9rem; }

    .status-pip {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 8px var(--success-glow);
      animation: pipBlink 2.6s ease-in-out infinite;
    }
    @keyframes pipBlink {
      0%,100%{ opacity:1; box-shadow:0 0 8px var(--success-glow); }
      50%    { opacity:.6; box-shadow:0 0 16px var(--success-glow); }
    }

    /* ── Page layout ───────────────────────────────────────────────── */
    .page-content {
      padding-top: var(--nav-h);
      min-height: calc(100vh - var(--nav-h) - 48px);
    }
    .page-wrap { padding: 1.6rem; }

    /* ── Page header ───────────────────────────────────────────────── */
    .page-hd { margin-bottom: 1.5rem; }
    .page-hd h4 {
      font-size: 1.35rem; font-weight: 800; letter-spacing: -.03em;
      color: var(--text-bright); margin: 0 0 .2rem;
    }
    .page-hd p { font-size: .78rem; color: var(--text-dim); margin: 0; }

    /* ── Cards ─────────────────────────────────────────────────────── */
    .card {
      background: var(--surface) !important;
      border: 1px solid var(--border) !important;
      border-radius: var(--radius) !important;
      box-shadow: var(--shadow);
      transition: border-color .22s ease, box-shadow .22s ease;
    }
    .card:hover {
      border-color: var(--border-bright) !important;
    }
    .card-header {
      background: rgba(13,21,37,.8) !important;
      border-bottom: 1px solid var(--border) !important;
      padding: .65rem 1rem; font-size: .8rem;
    }
    .card-body { padding: 1rem; }

    /* ── KPI cards ─────────────────────────────────────────────────── */
    .kpi-card {
      position: relative; overflow: hidden;
      padding: 1.2rem 1.2rem 1.1rem;
      background: var(--surface) !important;
      transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease !important;
    }
    .kpi-card::before {
      content: ''; position: absolute;
      top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(
        90deg,
        var(--kpi-c, var(--primary)),
        color-mix(in srgb, var(--kpi-c, var(--primary)) 40%, transparent)
      );
    }
    .kpi-card::after {
      content: ''; position: absolute;
      top: -30px; right: -30px;
      width: 110px; height: 110px; border-radius: 50%;
      background: radial-gradient(circle,
        var(--kpi-c, var(--primary)) 0%, transparent 70%);
      opacity: .12; pointer-events: none;
    }
    .kpi-card:hover {
      transform: translateY(-3px) !important;
      border-color: var(--kpi-c, var(--primary)) !important;
      box-shadow:
        var(--shadow-lg),
        0 0 0 1px var(--kpi-c, var(--primary)),
        0 0 32px var(--kpi-glow, var(--primary-glow)) !important;
    }
    .kpi-rq-badge {
      display: inline-block;
      font-size: .6rem; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--kpi-c, var(--primary));
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 4px; padding: 1px 7px; margin-bottom: .55rem;
    }
    .kpi-num {
      font-size: 2.2rem; font-weight: 800;
      line-height: 1; letter-spacing: -.04em;
      color: var(--kpi-c, var(--primary));
      font-variant-numeric: tabular-nums;
      min-height: 2.2rem;
      text-shadow: 0 0 22px var(--kpi-glow, var(--primary-glow));
      transition: filter .25s ease;
    }
    .kpi-title {
      font-size: .8rem; font-weight: 600;
      color: var(--text); margin-top: .4rem;
    }
    .kpi-sub { font-size: .72rem; color: var(--text-dim); margin-top: .18rem; }
    .kpi-icon {
      position: absolute; right: 1rem; top: 50%;
      transform: translateY(-50%);
      font-size: 2.2rem; color: var(--kpi-c, var(--primary));
      opacity: .09; pointer-events: none;
    }

    /* ── Section header ────────────────────────────────────────────── */
    .sec-hd {
      font-size: .68rem; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; color: var(--text-dim);
      display: flex; align-items: center; gap: .5rem;
      margin-bottom: .8rem;
    }
    .sec-hd::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ── Tables ────────────────────────────────────────────────────── */
    .table {
      --bs-table-bg: transparent;
      --bs-table-hover-bg: rgba(77,139,255,.05);
      color: var(--text); margin-bottom: 0;
    }
    .table th {
      font-size: .7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .07em;
      color: var(--text-dim); border-color: var(--border);
      padding: .65rem 1rem; white-space: nowrap;
      background: rgba(13,21,37,.8);
    }
    .table td {
      font-size: .84rem; color: var(--text);
      border-color: rgba(77,139,255,.06);
      padding: .62rem 1rem; vertical-align: middle;
    }
    .table-hover tbody tr {
      cursor: pointer;
      transition: background .18s ease, border-left-color .18s ease;
      border-left: 3px solid transparent;
    }
    .table-hover tbody tr:hover {
      border-left-color: var(--primary) !important;
      background: rgba(77,139,255,.06) !important;
    }

    /* ── Code ──────────────────────────────────────────────────────── */
    .code-block-wrap { position: relative; }
    .code-block {
      background: #030507; color: var(--text-code);
      border: 1px solid rgba(77,139,255,.14);
      border-left: 3px solid rgba(77,139,255,.30);
      border-radius: var(--radius-sm);
      padding: .9rem 1rem;
      font-family: var(--font-mono); font-size: .79rem;
      line-height: 1.7; overflow-x: auto; white-space: pre;
      box-shadow: inset 0 1px 8px rgba(0,0,0,.55);
      transition: border-left-color .2s ease;
    }
    .code-block:hover { border-left-color: var(--primary); }
    .code-copy-btn {
      position: absolute; top: .45rem; right: .45rem;
      opacity: 0; transition: opacity .2s ease;
      padding: .2rem .5rem; font-size: .68rem;
      background: var(--surface-2); border: 1px solid var(--border-bright);
      color: var(--text-dim); border-radius: var(--radius-sm);
      cursor: pointer;
      display: flex; align-items: center; gap: .3rem;
    }
    .code-copy-btn:hover { color: var(--text-bright); border-color: var(--primary); }
    .code-block-wrap:hover .code-copy-btn { opacity: 1; }

    /* Syntax highlighting tokens */
    .tok-kw      { color: #c792ea; }
    .tok-lib     { color: #82aaff; }
    .tok-fn      { color: #82cfff; }
    .tok-comment { color: #546e7a; font-style: italic; }
    .tok-num     { color: #f78c6c; }
    .tok-str     { color: #c3e88d; }
    .tok-op      { color: #89ddff; }

    code {
      font-family: var(--font-mono); font-size: .82em;
      background: rgba(77,139,255,.09);
      color: #7ec8f4;
      padding: .1em .38em; border-radius: 4px;
      border: 1px solid rgba(77,139,255,.14);
    }

    /* ── Badges ────────────────────────────────────────────────────── */
    .badge { font-weight: 500; letter-spacing: .02em; }
    .badge-verified {
      background: rgba(0,229,176,.14); color: #00e5b0;
      border: 1px solid rgba(0,229,176,.32);
      box-shadow: 0 0 8px rgba(0,229,176,.18);
    }
    .badge-checked {
      background: rgba(0,229,255,.14); color: #4ddbff;
      border: 1px solid rgba(0,229,255,.30);
    }
    .badge-unverified {
      background: rgba(61,85,112,.14); color: #3d5570;
      border: 1px solid rgba(61,85,112,.22);
    }
    .badge-llm {
      background: rgba(139,92,246,.18); color: #c4b5fd;
      border: 1px solid rgba(139,92,246,.32);
      box-shadow: 0 0 8px rgba(139,92,246,.15);
    }
    .badge-template {
      background: rgba(0,176,255,.14); color: #48caff;
      border: 1px solid rgba(0,176,255,.28);
    }
    .badge-manual {
      background: rgba(255,204,0,.14); color: #ffd84d;
      border: 1px solid rgba(255,204,0,.28);
    }

    /* ── Empty state ───────────────────────────────────────────────── */
    .empty-state {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2.8rem 1.5rem; color: var(--text-dim); text-align: center;
    }
    .empty-state .bi { font-size: 2.6rem; display: block; margin-bottom: .7rem; opacity: .3; }
    .empty-state > div { font-size: .83rem; }

    /* ── Skeleton shimmer ──────────────────────────────────────────── */
    .skeleton {
      background: linear-gradient(90deg,
        var(--surface-2) 25%, var(--surface-3) 50%, var(--surface-2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: var(--radius-sm);
      height: 14px;
    }
    .skeleton-lg { height: 36px; }
    .skeleton-sm { height: 10px; }
    @keyframes shimmer {
      0%   { background-position:  200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── Progress ──────────────────────────────────────────────────── */
    .progress { background: var(--surface-3); border-radius: 99px; }
    .progress-bar { border-radius: 99px; }

    /* ── Form controls ─────────────────────────────────────────────── */
    .form-select, .form-control {
      background: var(--surface-2); border-color: var(--border);
      color: var(--text); font-size: .81rem;
    }
    .form-select:focus, .form-control:focus {
      background: var(--surface-2); border-color: var(--primary);
      color: var(--text-bright);
      box-shadow: 0 0 0 3px rgba(77,139,255,.14);
    }
    .form-check-input { background-color: var(--surface-3); border-color: var(--border-bright); }
    .form-check-input:checked { background-color: var(--primary); border-color: var(--primary); }
    .form-check-label { font-size: .81rem; color: var(--text-dim); }

    /* ── Buttons ───────────────────────────────────────────────────── */
    .btn-outline-secondary {
      border-color: var(--border-bright); color: var(--text-dim);
    }
    .btn-outline-secondary:hover {
      background: var(--surface-2); border-color: var(--border-bright); color: var(--text);
    }
    .btn-outline-primary {
      border-color: rgba(77,139,255,.38); color: var(--primary);
    }
    .btn-outline-primary:hover {
      background: var(--primary-dim); border-color: var(--primary); color: var(--primary);
      box-shadow: 0 0 12px rgba(77,139,255,.2);
    }
    .btn-outline-light { border-color: var(--border); color: var(--text-dim); }
    .btn-outline-light:hover { background: var(--surface-2); color: var(--text); }
    .btn-outline-warning { border-color: rgba(255,204,0,.35); color: var(--warning); }
    .btn-outline-warning:hover {
      background: var(--warning-dim); border-color: var(--warning); color: var(--warning);
      box-shadow: 0 0 12px rgba(255,204,0,.18);
    }

    /* ── Modals ────────────────────────────────────────────────────── */
    .modal-content {
      background: var(--surface) !important;
      border: 1px solid var(--border-bright);
      border-radius: var(--radius-lg);
      box-shadow: 0 24px 80px rgba(0,0,0,.75);
    }
    .modal-header { border-bottom: 1px solid var(--border); padding: 1rem 1.25rem; }
    .modal-footer { border-top: 1px solid var(--border); }
    .modal-backdrop.show { opacity: .75; background: #000; }
    .btn-close { filter: invert(1) brightness(.5); }

    /* ── List group ────────────────────────────────────────────────── */
    .list-group-item {
      background: transparent; border-color: var(--border); color: var(--text);
    }
    .list-group-item-action:hover {
      background: var(--primary-dim); color: var(--text-bright);
    }

    /* ── Alert ─────────────────────────────────────────────────────── */
    .alert-light {
      background: var(--surface-2); border-color: var(--border); color: var(--text);
    }

    /* ── Toast system ──────────────────────────────────────────────── */
    #toast-container {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      z-index: 9500; display: flex; flex-direction: column;
      gap: .5rem; pointer-events: none;
    }
    .toast-item {
      background: var(--surface-2);
      border: 1px solid var(--border-bright);
      border-radius: var(--radius);
      padding: .65rem 1rem;
      font-size: .82rem; color: var(--text-bright);
      box-shadow: var(--shadow-lg);
      pointer-events: auto;
      display: flex; align-items: center;
      transform: translateX(120%); opacity: 0;
      transition: transform .3s cubic-bezier(.4,0,.2,1), opacity .3s ease;
      max-width: 300px; min-width: 180px;
    }
    .toast-item.show { transform: translateX(0); opacity: 1; }
    .toast-success { border-left: 3px solid var(--success); }
    .toast-error   { border-left: 3px solid var(--danger); }
    .toast-info    { border-left: 3px solid var(--info); }

    /* ── Footer ────────────────────────────────────────────────────── */
    footer {
      background: rgba(8,13,24,.95) !important;
      border-top: 1px solid var(--border) !important;
      padding: .75rem 0;
    }
    .footer-txt { font-size: .74rem; color: var(--text-dim); }

    /* ── Animations ────────────────────────────────────────────────── */
    @keyframes revealUp {
      from { opacity:0; transform:translateY(18px) scale(.97); filter:blur(4px); }
      to   { opacity:1; transform:translateY(0)    scale(1);   filter:blur(0); }
    }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes glowPulse {
      0%,100% { box-shadow: 0 0 6px currentColor; }
      50%      { box-shadow: 0 0 20px currentColor; }
    }

    .anim-up { animation: revealUp .45s cubic-bezier(.4,0,.2,1) both; }
    .d1 { animation-delay:.05s; }
    .d2 { animation-delay:.10s; }
    .d3 { animation-delay:.16s; }
    .d4 { animation-delay:.22s; }
    .d5 { animation-delay:.28s; }

    /* ── Gradient text utility ─────────────────────────────────────── */
    .grad-text {
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Responsive ────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .kpi-num { font-size: 1.7rem; }
      .page-hd h4 { font-size: 1.15rem; }
      .page-wrap { padding: 1rem; }
      .bg-blob { display: none; }
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>

<body>

<!-- ════════════════════════ Toast container ════════════════════════════ -->
<div id="toast-container" aria-live="polite"></div>

<!-- ════════════════════════ Scripts ════════════════════════════════════ -->
<script src="/static/bootstrap.bundle.min.js"></script>
<script src="/static/chart.umd.min.js"></script>

<script>
/* ── Chart.js global defaults ──────────────────────────────────────────── */
Chart.defaults.color          = '#3d5570';
Chart.defaults.borderColor    = 'rgba(77,139,255,.10)';
Chart.defaults.font.family    = 'var(--font-ui, system-ui)';
Chart.defaults.font.size      = 12;
Chart.defaults.animation.duration = 780;
Chart.defaults.animation.easing   = 'easeOutQuart';

window.TOOLTIP_CFG = {
  backgroundColor:  '#0d1525',
  borderColor:      'rgba(77,139,255,.28)',
  borderWidth:      1,
  titleColor:       '#c8daf0',
  bodyColor:        '#3d5570',
  padding:          10,
  cornerRadius:     8,
  displayColors:    true,
  boxWidth:         10,
  boxHeight:        10,
};

/* ── Page progress bar ─────────────────────────────────────────────────── */
(function () {
  const pb = document.getElementById('page-progress');
  pb.style.opacity = '1';
  pb.style.width   = '20%';
  setTimeout(() => pb.style.width = '65%', 180);
  window.addEventListener('load', () => {
    setTimeout(() => {
      pb.style.width = '100%';
      setTimeout(() => {
        pb.style.opacity = '0';
        setTimeout(() => { pb.style.width = '0%'; }, 420);
      }, 320);
    }, 200);
  });
})();

/* ── Toast ─────────────────────────────────────────────────────────────── */
function showToast(msg, type = 'success') {
  const icons = {
    success: 'check-circle-fill',
    error:   'exclamation-triangle-fill',
    info:    'info-circle-fill',
  };
  const el = document.createElement('div');
  el.className = `toast-item toast-${type}`;
  el.style.color = type === 'success' ? 'var(--success)'
                 : type === 'error'   ? 'var(--danger)'
                 :                      'var(--info)';
  el.innerHTML =
    `<i class="bi bi-${icons[type] || icons.success} me-2"></i>` +
    `<span style="color:var(--text);">${msg}</span>`;
  document.getElementById('toast-container').appendChild(el);
  requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('show')));
  setTimeout(() => {
    el.classList.remove('show');
    setTimeout(() => el.remove(), 350);
  }, 2400);
}

/* ── Syntax highlighter (Python subset) ────────────────────────────────── */
function syntaxHighlight(escapedCode) {
  return escapedCode
    .replace(/\b(lambda|def|return|if|else|elif|for|in|and|or|not|import|from|True|False|None|with|as|try|except|class|yield|pass|raise|while|break|continue)\b/g,
      '<span class="tok-kw">$1</span>')
    .replace(/\b(torch|np|numpy|math|abs|allclose|reshape|view|float|int|bool|len|range|list|dict|set|tuple|sum|min|max|print|type|isinstance|getattr|hasattr)\b/g,
      '<span class="tok-lib">$1</span>')
    .replace(/(#[^\n\r]*)/g,
      '<span class="tok-comment">$1</span>')
    .replace(/\b(\d+\.?\d*(?:e[+-]?\d+)?)\b/g,
      '<span class="tok-num">$1</span>')
    .replace(/([+\-*\/=<>&|!%^~]+)/g,
      '<span class="tok-op">$1</span>');
}

/* ── Code copy button helper ───────────────────────────────────────────── */
function makeCopyBtn(textFn) {
  const btn = document.createElement('button');
  btn.className = 'code-copy-btn';
  btn.innerHTML = '<i class="bi bi-clipboard"></i> 复制';
  btn.addEventListener('click', () => {
    navigator.clipboard?.writeText(textFn()).then(() => {
      btn.innerHTML = '<i class="bi bi-check2"></i> 已复制';
      btn.style.color = 'var(--success)';
      setTimeout(() => {
        btn.innerHTML = '<i class="bi bi-clipboard"></i> 复制';
        btn.style.color = '';
      }, 1800);
      showToast('已复制到剪贴板');
    }).catch(() => showToast('复制失败', 'error'));
  });
  return btn;
}

/* ── countUp ────────────────────────────────────────────────────────────── */
function countUp(el, rawVal, suffix) {
  if (rawVal === null || rawVal === undefined) { el.textContent = '—'; return; }
  const s = String(rawVal);
  if (s === '—' || isNaN(parseFloat(s))) { el.textContent = s + (suffix || ''); return; }
  const end     = parseFloat(s);
  const isFloat = s.includes('.');
  const dec     = isFloat ? (s.split('.')[1] || '').length : 0;
  const dur = 680;
  const t0  = performance.now();
  function tick(now) {
    const p = Math.min((now - t0) / dur, 1);
    const e = 1 - Math.pow(1 - p, 3.2);
    el.textContent = (isFloat ? (e * end).toFixed(dec) : Math.round(e * end)) + (suffix || '');
    if (p < 1) {
      requestAnimationFrame(tick);
    } else {
      el.style.filter = 'brightness(1.6)';
      setTimeout(() => { el.style.filter = ''; }, 280);
    }
  }
  requestAnimationFrame(tick);
}

/* ── Gradient helpers for Chart.js ─────────────────────────────────────── */
function makeBarGradientH(chart, colorStop0, colorStop1) {
  const { ctx, chartArea } = chart;
  if (!chartArea) return colorStop0;
  const g = ctx.createLinearGradient(chartArea.left, 0, chartArea.right, 0);
  g.addColorStop(0, colorStop0);
  g.addColorStop(1, colorStop1);
  return g;
}
function makeBarGradientV(chart, colorStop0, colorStop1) {
  const { ctx, chartArea } = chart;
  if (!chartArea) return colorStop0;
  const g = ctx.createLinearGradient(0, chartArea.bottom, 0, chartArea.top);
  g.addColorStop(0, colorStop0);
  g.addColorStop(1, colorStop1);
  return g;
}
</script>
