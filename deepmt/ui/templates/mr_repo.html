{% extends "base.html" %}
{% block title %}MR 知识库 — DeepMT Dashboard{% endblock %}

{% block content %}
<div class="page-wrap">

  <!-- ── Header ──────────────────────────────────────────────────────── -->
  <div class="page-hd d-flex justify-content-between align-items-start">
    <div>
      <h4>MR 知识库</h4>
      <p>
        算子列表 · MR 统计 · 来源与分类分布
        <span class="ms-2" style="font-size:.65rem; color:var(--c-rq1);
              background:var(--primary-dim); border:1px solid rgba(61,127,255,.2);
              border-radius:4px; padding:1px 7px; font-weight:700;
              letter-spacing:.05em; text-transform:uppercase;">RQ1</span>
      </p>
    </div>
  </div>

  <!-- ── Filter Bar ──────────────────────────────────────────────────── -->
  <div class="card mb-3 anim-up d1">
    <div class="card-body py-2">
      <div class="row g-2 align-items-center">
        <div class="col-auto">
          <select class="form-select form-select-sm" id="filter-framework" style="min-width:116px;">
            <option value="">全部框架</option>
            <option value="pytorch">PyTorch</option>
            <option value="numpy">NumPy</option>
          </select>
        </div>
        <div class="col-auto">
          <select class="form-select form-select-sm" id="filter-category" style="min-width:128px;">
            <option value="">全部类别</option>
          </select>
        </div>
        <div class="col-auto">
          <select class="form-select form-select-sm" id="filter-source" style="min-width:108px;">
            <option value="">全部来源</option>
            <option value="llm">LLM</option>
            <option value="template">模板</option>
            <option value="manual">手动</option>
          </select>
        </div>
        <div class="col-auto">
          <div class="form-check mb-0 mt-1">
            <input class="form-check-input" type="checkbox" id="filter-verified">
            <label class="form-check-label" for="filter-verified">仅已验证</label>
          </div>
        </div>
        <div class="col">
          <input type="text" class="form-control form-control-sm" id="filter-search"
                 placeholder="搜索算子名称…">
        </div>
        <div class="col-auto">
          <button class="btn btn-sm btn-outline-secondary" onclick="clearFilters()">
            <i class="bi bi-x-circle me-1"></i>清除
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Stats ───────────────────────────────────────────────────────── -->
  <div class="row g-3 mb-4">
    <div class="col-6 col-md-3 anim-up d1">
      <div class="card kpi-card text-center" style="--kpi-c: var(--c-rq1);">
        <div class="kpi-num" id="stat-total">—</div>
        <div class="kpi-sub mt-2">MR 总数</div>
      </div>
    </div>
    <div class="col-6 col-md-3 anim-up d2">
      <div class="card kpi-card text-center" style="--kpi-c: var(--success);">
        <div class="kpi-num" id="stat-verified-rate">—</div>
        <div class="kpi-sub mt-2">验证率</div>
      </div>
    </div>
    <div class="col-6 col-md-3 anim-up d3">
      <div class="card kpi-card text-center" style="--kpi-c: var(--info);">
        <div class="kpi-num" id="stat-operators">—</div>
        <div class="kpi-sub mt-2">覆盖算子</div>
      </div>
    </div>
    <div class="col-6 col-md-3 anim-up d4">
      <div class="card kpi-card text-center" style="--kpi-c: var(--warning);">
        <div class="kpi-num" id="stat-avg">—</div>
        <div class="kpi-sub mt-2">平均 MR/算子</div>
      </div>
    </div>
  </div>

  <!-- ── Charts ──────────────────────────────────────────────────────── -->
  <div class="row g-3 mb-4">
    <div class="col-md-5 anim-up d2">
      <div class="card h-100">
        <div class="card-header d-flex align-items-center gap-2">
          <i class="bi bi-pie-chart-fill" style="color:var(--primary);"></i>
          <span class="fw-semibold">来源分布</span>
        </div>
        <div class="card-body d-flex align-items-center justify-content-center"
             style="min-height:195px;">
          <canvas id="chart-source" style="max-height:175px;"></canvas>
        </div>
      </div>
    </div>
    <div class="col-md-7 anim-up d3">
      <div class="card h-100">
        <div class="card-header d-flex align-items-center gap-2">
          <i class="bi bi-bar-chart-fill" style="color:var(--primary);"></i>
          <span class="fw-semibold">分类分布</span>
        </div>
        <div class="card-body d-flex align-items-center justify-content-center"
             style="min-height:195px;">
          <canvas id="chart-cat" style="max-height:175px;"></canvas>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Operator Table ──────────────────────────────────────────────── -->
  <div class="card anim-up d4">
    <div class="card-header d-flex align-items-center gap-2">
      <i class="bi bi-table" style="color:var(--primary);"></i>
      <span class="fw-semibold">算子列表</span>
      <span id="table-count" class="ms-auto"
            style="font-size:.68rem; color:var(--text-dim);"></span>
    </div>
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead>
            <tr>
              <th class="ps-3">算子名称</th>
              <th>MR 总数</th>
              <th>已验证</th>
              <th>类别</th>
              <th>来源</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="mr-tbody">
            <tr><td colspan="6">
              <div class="empty-state">
                <i class="bi bi-hourglass-split"></i>
                <div>加载中…</div>
              </div>
            </td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div>
{% endblock %}

{% block extra_scripts %}
<script src="/static/chart.umd.min.js"></script>
<script>
Chart.defaults.color       = '#4d6480';
Chart.defaults.borderColor = 'rgba(61,127,255,.12)';
Chart.defaults.font.family = 'var(--font-ui, system-ui)';
Chart.defaults.font.size   = 12;

let _allOperators = [];
let _srcChart, _catChart;

async function loadData() {
  try {
    const resp = await fetch('/api/mr-repository');
    const json = await resp.json();
    if (!json.data) return showEmpty();
    const d = json.data;
    _allOperators = d.operators || [];

    countUp(document.getElementById('stat-total'),        d.total_mr_count);
    countUp(document.getElementById('stat-verified-rate'),
            d.verification_rate != null
              ? (d.verification_rate * 100).toFixed(1) : null, '%');
    countUp(document.getElementById('stat-operators'),    d.operators_with_mr);
    countUp(document.getElementById('stat-avg'),          d.avg_mr_per_operator);

    if (d.source_distribution)   renderSrcChart(d.source_distribution);
    if (d.category_distribution) renderCatChart(d.category_distribution);

    if (d.category_distribution) {
      const sel = document.getElementById('filter-category');
      Object.keys(d.category_distribution).forEach(c => {
        sel.innerHTML += `<option value="${c}">${c}</option>`;
      });
    }
    renderTable(_allOperators);
  } catch (e) {
    console.warn('加载失败:', e);
    showEmpty();
  }
}

function showEmpty() {
  document.getElementById('mr-tbody').innerHTML = `<tr><td colspan="6">
    <div class="empty-state">
      <i class="bi bi-database-x"></i>
      <div>暂无 MR 数据，请先运行 <code>deepmt mr generate &lt;operator&gt; --save</code></div>
    </div></td></tr>`;
}

function renderTable(ops) {
  const tbody = document.getElementById('mr-tbody');
  document.getElementById('table-count').textContent = ops.length + ' 个算子';
  if (!ops.length) { showEmpty(); return; }

  tbody.innerHTML = ops.map(op => {
    const cats = (op.categories||[]).map(c =>
      `<span class="badge badge-unverified me-1" style="font-size:.65rem;">${c}</span>`
    ).join('');
    const srcs = (op.sources||[]).map(s => {
      const cls = s==='llm' ? 'badge-llm' : s==='template' ? 'badge-template' : 'badge-manual';
      return `<span class="badge ${cls} me-1" style="font-size:.65rem;">${s}</span>`;
    }).join('');
    const vBadge = op.verified_count > 0
      ? `<span class="badge badge-verified">${op.verified_count}</span>`
      : `<span class="badge badge-unverified">0</span>`;
    return `<tr>
      <td class="ps-3">
        <code style="font-size:.82rem;font-weight:600;">${op.operator_name}</code>
      </td>
      <td style="font-variant-numeric:tabular-nums;">${op.total_count ?? 0}</td>
      <td>${vBadge}</td>
      <td>${cats || '<span style="color:var(--text-dim);">—</span>'}</td>
      <td>${srcs || '<span style="color:var(--text-dim);">—</span>'}</td>
      <td>
        <a href="/mr/${encodeURIComponent(op.operator_name)}"
           class="btn btn-sm btn-outline-primary py-0 px-2" style="font-size:.75rem;">
          <i class="bi bi-eye me-1"></i>详情
        </a>
      </td>
    </tr>`;
  }).join('');
}

function applyFilters() {
  const fw  = document.getElementById('filter-framework').value.toLowerCase();
  const cat = document.getElementById('filter-category').value.toLowerCase();
  const src = document.getElementById('filter-source').value.toLowerCase();
  const vfy = document.getElementById('filter-verified').checked;
  const q   = document.getElementById('filter-search').value.toLowerCase();

  const filtered = _allOperators.filter(op => {
    if (fw  && !(op.frameworks||[]).some(f => f.toLowerCase().includes(fw)))  return false;
    if (cat && !(op.categories||[]).some(c => c.toLowerCase().includes(cat))) return false;
    if (src && !(op.sources||[]).some(s => s.toLowerCase().includes(src)))    return false;
    if (vfy && !(op.verified_count > 0)) return false;
    if (q   && !op.operator_name.toLowerCase().includes(q)) return false;
    return true;
  });
  renderTable(filtered);
}

function clearFilters() {
  ['filter-framework','filter-category','filter-source','filter-search']
    .forEach(id => document.getElementById(id).value = '');
  document.getElementById('filter-verified').checked = false;
  renderTable(_allOperators);
}

['filter-framework','filter-category','filter-source'].forEach(id =>
  document.getElementById(id).addEventListener('change', applyFilters));
document.getElementById('filter-verified').addEventListener('change', applyFilters);
document.getElementById('filter-search').addEventListener('input', applyFilters);

const _tooltipCfg = {
  backgroundColor:'#111a2e', borderColor:'rgba(61,127,255,.25)',
  borderWidth:1, titleColor:'#bfd0e8', bodyColor:'#4d6480', padding:10
};

function renderSrcChart(dist) {
  const labels = Object.keys(dist), values = Object.values(dist);
  const colors = { llm:'#a78bfa', template:'#48caff', manual:'#ffd060', unknown:'#4d6480' };
  if (_srcChart) _srcChart.destroy();
  _srcChart = new Chart(document.getElementById('chart-source'), {
    type: 'pie',
    data: {
      labels,
      datasets: [{
        data: values,
        backgroundColor: labels.map(l => colors[l]||'#4d6480'),
        borderWidth: 2, borderColor: '#111a2e', hoverOffset: 4,
      }]
    },
    options: {
      plugins: {
        legend: { position:'bottom', labels:{ color:'#4d6480', font:{size:11}, padding:10, boxWidth:10, boxHeight:10 } },
        tooltip: _tooltipCfg,
      }
    }
  });
}

function renderCatChart(dist) {
  const labels = Object.keys(dist), values = Object.values(dist);
  if (_catChart) _catChart.destroy();
  _catChart = new Chart(document.getElementById('chart-cat'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{ data:values, backgroundColor:'rgba(61,127,255,.65)', borderRadius:4 }]
    },
    options: {
      indexAxis: 'y',
      plugins: { legend:{display:false}, tooltip:_tooltipCfg },
      scales: {
        x: { grid:{color:'rgba(61,127,255,.08)'}, ticks:{color:'#4d6480'} },
        y: { grid:{display:false}, ticks:{color:'#bfd0e8', font:{size:11}} }
      }
    }
  });
}

loadData();
</script>
{% endblock %}
