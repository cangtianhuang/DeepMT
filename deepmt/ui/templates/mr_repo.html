{% extends "base.html" %}

{% block title %}MR 知识库 — DeepMT Dashboard{% endblock %}

{% block content %}
<div class="container-fluid px-4 py-4">

  <!-- ── 页面标题 ──────────────────────────────────────────────────────── -->
  <div class="d-flex justify-content-between align-items-start mb-4">
    <div>
      <h4 class="fw-bold mb-1">MR 知识库</h4>
      <p class="text-muted mb-0" style="font-size:.875rem;">
        算子列表 · MR 统计 · 来源与分类分布
        <span class="badge text-bg-primary ms-2" style="font-size:.68rem;">RQ1</span>
      </p>
    </div>
  </div>

  <!-- ── 筛选栏 ────────────────────────────────────────────────────────── -->
  <div class="card mb-3">
    <div class="card-body py-2">
      <div class="row g-2 align-items-center">
        <div class="col-auto">
          <select class="form-select form-select-sm" id="filter-framework" style="min-width:120px;">
            <option value="">全部框架</option>
            <option value="pytorch">PyTorch</option>
            <option value="numpy">NumPy</option>
          </select>
        </div>
        <div class="col-auto">
          <select class="form-select form-select-sm" id="filter-category" style="min-width:130px;">
            <option value="">全部类别</option>
          </select>
        </div>
        <div class="col-auto">
          <select class="form-select form-select-sm" id="filter-source" style="min-width:110px;">
            <option value="">全部来源</option>
            <option value="llm">LLM</option>
            <option value="template">模板</option>
            <option value="manual">手动</option>
          </select>
        </div>
        <div class="col-auto">
          <div class="form-check mb-0 mt-1">
            <input class="form-check-input" type="checkbox" id="filter-verified">
            <label class="form-check-label small" for="filter-verified">仅已验证</label>
          </div>
        </div>
        <div class="col">
          <input type="text" class="form-control form-control-sm" id="filter-search"
                 placeholder="搜索算子名称…">
        </div>
        <div class="col-auto">
          <button class="btn btn-sm btn-outline-secondary" onclick="clearFilters()">
            <i class="bi bi-x-circle me-1"></i>清除
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── 统计卡片 ──────────────────────────────────────────────────────── -->
  <div class="row g-3 mb-4">
    <div class="col-6 col-md-3">
      <div class="card text-center">
        <div class="card-body py-3">
          <div class="kpi-value text-primary" id="stat-total">—</div>
          <div class="kpi-sub">MR 总数</div>
        </div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card text-center">
        <div class="card-body py-3">
          <div class="kpi-value text-success" id="stat-verified-rate">—</div>
          <div class="kpi-sub">验证率</div>
        </div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card text-center">
        <div class="card-body py-3">
          <div class="kpi-value text-info" id="stat-operators">—</div>
          <div class="kpi-sub">覆盖算子</div>
        </div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card text-center">
        <div class="card-body py-3">
          <div class="kpi-value text-warning" id="stat-avg">—</div>
          <div class="kpi-sub">平均 MR/算子</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── 分布图表 ──────────────────────────────────────────────────────── -->
  <div class="row g-3 mb-4">
    <div class="col-md-5">
      <div class="card h-100">
        <div class="card-header d-flex align-items-center gap-2">
          <i class="bi bi-pie-chart-fill text-primary"></i>
          <span class="fw-semibold">来源分布</span>
        </div>
        <div class="card-body d-flex align-items-center justify-content-center" style="min-height:200px;">
          <canvas id="chart-source" style="max-height:180px;"></canvas>
        </div>
      </div>
    </div>
    <div class="col-md-7">
      <div class="card h-100">
        <div class="card-header d-flex align-items-center gap-2">
          <i class="bi bi-bar-chart-fill text-primary"></i>
          <span class="fw-semibold">分类分布</span>
        </div>
        <div class="card-body d-flex align-items-center justify-content-center" style="min-height:200px;">
          <canvas id="chart-cat" style="max-height:180px;"></canvas>
        </div>
      </div>
    </div>
  </div>

  <!-- ── 算子表格 ──────────────────────────────────────────────────────── -->
  <div class="card">
    <div class="card-header d-flex align-items-center gap-2">
      <i class="bi bi-table text-primary"></i>
      <span class="fw-semibold">算子列表</span>
      <span class="badge text-bg-secondary ms-auto" id="table-count" style="font-size:.7rem;"></span>
    </div>
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead class="table-light">
            <tr>
              <th class="ps-3">算子名称</th>
              <th>MR 总数</th>
              <th>已验证</th>
              <th>类别</th>
              <th>来源</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="mr-tbody">
            <tr><td colspan="6">
              <div class="empty-state py-4">
                <i class="bi bi-hourglass-split"></i>
                <div>加载中…</div>
              </div>
            </td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div>
{% endblock %}

{% block extra_scripts %}
<script src="/static/chart.umd.min.js"></script>
<script>
let _allOperators = [];
let _sourceChart, _catChart;

async function loadData() {
  try {
    const resp = await fetch('/api/mr-repository');
    const json = await resp.json();
    if (!json.data) return showEmpty();
    const d = json.data;
    _allOperators = d.operators || [];

    // 统计卡片
    document.getElementById('stat-total').textContent = d.total_mr_count ?? '—';
    document.getElementById('stat-verified-rate').textContent =
      d.verification_rate != null ? (d.verification_rate * 100).toFixed(1) + '%' : '—';
    document.getElementById('stat-operators').textContent = d.operators_with_mr ?? '—';
    document.getElementById('stat-avg').textContent = d.avg_mr_per_operator ?? '—';

    // 渲染图表
    if (d.source_distribution) renderSourceChart(d.source_distribution);
    if (d.category_distribution) renderCatChart(d.category_distribution);

    // 填充分类下拉
    if (d.category_distribution) {
      const sel = document.getElementById('filter-category');
      Object.keys(d.category_distribution).forEach(c => {
        sel.innerHTML += `<option value="${c}">${c}</option>`;
      });
    }

    renderTable(_allOperators);
  } catch (e) {
    console.warn('加载失败:', e);
    showEmpty();
  }
}

function showEmpty() {
  document.getElementById('mr-tbody').innerHTML = `<tr><td colspan="6">
    <div class="empty-state py-5">
      <i class="bi bi-database-x"></i>
      <div>暂无 MR 数据，请先运行 <code>deepmt mr generate &lt;operator&gt; --save</code></div>
    </div></td></tr>`;
}

function renderTable(ops) {
  const tbody = document.getElementById('mr-tbody');
  document.getElementById('table-count').textContent = ops.length + ' 个算子';
  if (!ops.length) { showEmpty(); return; }

  tbody.innerHTML = ops.map(op => {
    const cats = (op.categories || []).map(c =>
      `<span class="badge text-bg-light text-dark border me-1" style="font-size:.68rem;">${c}</span>`
    ).join('');
    const srcs = (op.sources || []).map(s => {
      const cls = s === 'llm' ? 'badge-llm' : s === 'template' ? 'badge-template' : 'badge-manual';
      return `<span class="badge ${cls} me-1" style="font-size:.68rem;">${s}</span>`;
    }).join('');
    return `<tr data-op="${op.operator_name}" data-verified="${op.verified_count > 0}">
      <td class="ps-3"><code class="fw-semibold">${op.operator_name}</code></td>
      <td>${op.total_count ?? 0}</td>
      <td>
        <span class="badge ${op.verified_count > 0 ? 'badge-verified' : 'badge-unverified'}">
          ${op.verified_count ?? 0}
        </span>
      </td>
      <td>${cats || '<span class="text-muted">—</span>'}</td>
      <td>${srcs || '<span class="text-muted">—</span>'}</td>
      <td>
        <a href="/mr/${encodeURIComponent(op.operator_name)}"
           class="btn btn-sm btn-outline-primary py-0 px-2" style="font-size:.78rem;">
          <i class="bi bi-eye me-1"></i>详情
        </a>
      </td>
    </tr>`;
  }).join('');
}

function applyFilters() {
  const fw  = document.getElementById('filter-framework').value.toLowerCase();
  const cat = document.getElementById('filter-category').value.toLowerCase();
  const src = document.getElementById('filter-source').value.toLowerCase();
  const vfy = document.getElementById('filter-verified').checked;
  const q   = document.getElementById('filter-search').value.toLowerCase();

  const filtered = _allOperators.filter(op => {
    if (fw && !(op.frameworks || []).some(f => f.toLowerCase().includes(fw))) return false;
    if (cat && !(op.categories || []).some(c => c.toLowerCase().includes(cat))) return false;
    if (src && !(op.sources || []).some(s => s.toLowerCase().includes(src))) return false;
    if (vfy && !(op.verified_count > 0)) return false;
    if (q && !op.operator_name.toLowerCase().includes(q)) return false;
    return true;
  });
  renderTable(filtered);
}

function clearFilters() {
  ['filter-framework','filter-category','filter-source','filter-search']
    .forEach(id => document.getElementById(id).value = '');
  document.getElementById('filter-verified').checked = false;
  renderTable(_allOperators);
}

['filter-framework','filter-category','filter-source'].forEach(id =>
  document.getElementById(id).addEventListener('change', applyFilters));
document.getElementById('filter-verified').addEventListener('change', applyFilters);
document.getElementById('filter-search').addEventListener('input', applyFilters);

function renderSourceChart(dist) {
  const labels = Object.keys(dist), values = Object.values(dist);
  const colors = { llm: '#7c3aed', template: '#0891b2', manual: '#b45309', unknown: '#6c757d' };
  if (_sourceChart) _sourceChart.destroy();
  _sourceChart = new Chart(document.getElementById('chart-source'), {
    type: 'pie',
    data: {
      labels,
      datasets: [{ data: values,
        backgroundColor: labels.map(l => colors[l] || '#6c757d'),
        borderWidth: 2, borderColor: '#fff' }]
    },
    options: { plugins: { legend: { position: 'bottom', labels: { font: { size: 11 }, padding: 10 } } } }
  });
}

function renderCatChart(dist) {
  const labels = Object.keys(dist), values = Object.values(dist);
  if (_catChart) _catChart.destroy();
  _catChart = new Chart(document.getElementById('chart-cat'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{ data: values,
        backgroundColor: '#3b82f6', borderRadius: 4 }]
    },
    options: {
      indexAxis: 'y',
      plugins: { legend: { display: false } },
      scales: { x: { grid: { display: false } }, y: { ticks: { font: { size: 11 } } } },
    }
  });
}

loadData();
</script>
{% endblock %}
