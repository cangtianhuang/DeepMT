{% extends "base.html" %}

{% block title %}{{ operator_name }} — MR 详情 — DeepMT Dashboard{% endblock %}

{% block content %}
<div class="container-fluid px-4 py-4">

  <!-- ── 页面标题 ──────────────────────────────────────────────────────── -->
  <div class="mb-4">
    <a href="/mr" class="btn btn-sm btn-outline-secondary mb-3">
      <i class="bi bi-arrow-left me-1"></i>返回知识库
    </a>
    <h4 class="fw-bold mb-1">
      <i class="bi bi-database-fill me-2 text-primary"></i>
      <code>{{ operator_name }}</code>
    </h4>
    <p class="text-muted mb-0" style="font-size:.875rem;">
      蜕变关系详情
      <span class="badge text-bg-primary ms-2" style="font-size:.68rem;">RQ1</span>
    </p>
  </div>

  <!-- ── MR 卡片列表 ──────────────────────────────────────────────────── -->
  <div id="mr-list">
    <div class="empty-state py-5">
      <i class="bi bi-hourglass-split"></i>
      <div>加载中…</div>
    </div>
  </div>

</div>
{% endblock %}

{% block extra_scripts %}
<script>
const OP = "{{ operator_name }}";

async function loadMRs() {
  try {
    const resp = await fetch('/api/mr-repository/' + encodeURIComponent(OP));
    const json = await resp.json();
    const mrs = json.data;
    const container = document.getElementById('mr-list');

    if (!mrs || mrs.length === 0) {
      container.innerHTML = `<div class="empty-state py-5">
        <i class="bi bi-database-x"></i>
        <div>该算子暂无 MR 记录</div>
      </div>`;
      return;
    }

    container.innerHTML = mrs.map((mr, i) => {
      const verifiedBadge = mr.verified
        ? '<span class="badge badge-verified me-1">已验证</span>'
        : mr.checked
          ? '<span class="badge badge-checked me-1">预检通过</span>'
          : '<span class="badge badge-unverified me-1">未验证</span>';

      const srcBadge = mr.source
        ? `<span class="badge ${mr.source === 'llm' ? 'badge-llm' : mr.source === 'template' ? 'badge-template' : 'badge-manual'} me-1">${mr.source}</span>`
        : '';

      const catBadge = mr.category
        ? `<span class="badge text-bg-light text-dark border me-1" style="font-size:.7rem;">${mr.category}</span>`
        : '';

      return `
      <div class="card mb-3">
        <div class="card-header d-flex align-items-center gap-2 flex-wrap">
          <span class="fw-semibold text-muted" style="font-size:.8rem;">#${i + 1}</span>
          <span class="fw-semibold flex-grow-1">${mr.description || '（无描述）'}</span>
          <div>${verifiedBadge}${srcBadge}${catBadge}</div>
        </div>
        <div class="card-body">
          <div class="row g-3">
            <div class="col-md-6">
              <div class="small text-muted fw-semibold mb-1">
                <i class="bi bi-arrow-right-circle me-1"></i>输入变换 <code>transform_code</code>
              </div>
              <pre class="code-block">${escHtml(mr.transform_code || '—')}</pre>
            </div>
            <div class="col-md-6">
              <div class="small text-muted fw-semibold mb-1">
                <i class="bi bi-check2-circle me-1"></i>Oracle 表达式 <code>oracle_expr</code>
              </div>
              <pre class="code-block">${escHtml(mr.oracle_expr || '—')}</pre>
            </div>
          </div>
          ${mr.analysis ? `
          <div class="mt-3">
            <button class="btn btn-sm btn-link p-0 text-muted" type="button"
                    data-bs-toggle="collapse" data-bs-target="#analysis-${i}">
              <i class="bi bi-chevron-down me-1"></i>查看分析备注
            </button>
            <div class="collapse mt-2" id="analysis-${i}">
              <div class="alert alert-light border mb-0" style="font-size:.85rem;">${escHtml(mr.analysis)}</div>
            </div>
          </div>` : ''}
        </div>
        <div class="card-footer text-muted d-flex gap-3" style="font-size:.78rem;">
          <span><i class="bi bi-hash me-1"></i>${mr.id || '—'}</span>
          <span><i class="bi bi-bullseye me-1"></i>tolerance: ${mr.tolerance ?? '1e-6'}</span>
          ${mr.applicable_frameworks ? `<span><i class="bi bi-layers me-1"></i>${mr.applicable_frameworks.join(', ')}</span>` : ''}
        </div>
      </div>`;
    }).join('');
  } catch (e) {
    document.getElementById('mr-list').innerHTML = `<div class="alert alert-warning">加载失败：${e.message}</div>`;
  }
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

loadMRs();
</script>
{% endblock %}
