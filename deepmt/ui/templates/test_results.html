{% extends "base.html" %}
{% block title %}测试结果 — DeepMT Dashboard{% endblock %}

{% block content %}
<div class="page-wrap">

  <!-- ── Header ──────────────────────────────────────────────────────── -->
  <div class="page-hd d-flex justify-content-between align-items-start">
    <div>
      <h4>测试结果</h4>
      <p>缺陷检测能力 · 通过率分布 · 证据包管理</p>
    </div>
    <button class="btn btn-sm btn-outline-secondary" onclick="location.reload()">
      <i class="bi bi-arrow-clockwise me-1"></i>刷新
    </button>
  </div>

  <!-- ── Stats ───────────────────────────────────────────────────────── -->
  <div class="row g-3 mb-4">
    <div class="col-6 col-md-3 anim-up d1">
      <div class="card kpi-card text-center" style="--kpi-c: var(--c-rq1);">
        <div class="kpi-num" id="stat-total-cases">—</div>
        <div class="kpi-sub mt-2">总测试用例</div>
      </div>
    </div>
    <div class="col-6 col-md-3 anim-up d2">
      <div class="card kpi-card text-center" style="--kpi-c: var(--success);">
        <div class="kpi-num" id="stat-pass-rate">—</div>
        <div class="kpi-sub mt-2">整体通过率</div>
      </div>
    </div>
    <div class="col-6 col-md-3 anim-up d3">
      <div class="card kpi-card text-center" style="--kpi-c: var(--c-rq2);">
        <div class="kpi-num" id="stat-failed">—</div>
        <div class="kpi-sub mt-2">失败用例数</div>
      </div>
    </div>
    <div class="col-6 col-md-3 anim-up d4">
      <div class="card kpi-card text-center" style="--kpi-c: var(--warning);">
        <div class="kpi-num" id="stat-evidence">—</div>
        <div class="kpi-sub mt-2">证据包</div>
      </div>
    </div>
  </div>

  <!-- ── Pass-rate chart ─────────────────────────────────────────────── -->
  <div class="card mb-4 anim-up d2">
    <div class="card-header d-flex align-items-center gap-2">
      <i class="bi bi-bar-chart-fill" style="color:var(--c-rq2);"></i>
      <span class="fw-semibold">各算子测试通过率</span>
    </div>
    <div class="card-body" style="min-height:200px;">
      <canvas id="chart-pass-rate" style="max-height:260px;"></canvas>
    </div>
  </div>

  <!-- ── Failures & Evidence ─────────────────────────────────────────── -->
  <div class="row g-3">

    <!-- Failure list -->
    <div class="col-lg-7 anim-up d3">
      <div class="card h-100">
        <div class="card-header d-flex align-items-center gap-2">
          <i class="bi bi-x-circle-fill" style="color:var(--danger);"></i>
          <span class="fw-semibold">失败用例</span>
          <span id="fail-count" class="ms-auto"
                style="font-size:.68rem; color:var(--danger);"></span>
        </div>
        <div class="card-body p-0">
          <div class="table-responsive" style="max-height:360px;overflow-y:auto;">
            <table class="table table-hover mb-0">
              <thead>
                <tr>
                  <th class="ps-3">算子</th>
                  <th>MR 描述</th>
                  <th>实际差值</th>
                  <th>时间</th>
                </tr>
              </thead>
              <tbody id="fail-tbody">
                <tr><td colspan="4">
                  <div class="empty-state">
                    <i class="bi bi-hourglass-split"></i>
                    <div>加载中…</div>
                  </div>
                </td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- Evidence packs -->
    <div class="col-lg-5 anim-up d4">
      <div class="card h-100">
        <div class="card-header d-flex align-items-center gap-2">
          <i class="bi bi-folder2-open" style="color:var(--warning);"></i>
          <span class="fw-semibold">证据包</span>
          <span id="evidence-count" class="ms-auto"
                style="font-size:.68rem; color:var(--warning);"></span>
        </div>
        <div id="evidence-list" class="card-body p-0"
             style="max-height:360px;overflow-y:auto;">
          <div class="empty-state">
            <i class="bi bi-hourglass-split"></i>
            <div>加载中…</div>
          </div>
        </div>
      </div>
    </div>
  </div>

</div><!-- /page-wrap -->

<!-- ── Reproduce Script Modal ──────────────────────────────────────────── -->
<div class="modal fade" id="scriptModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" style="font-size:.95rem; color:var(--text-bright);">
          <i class="bi bi-code-slash me-2" style="color:var(--primary);"></i>Python 复现脚本
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-0">
        <pre class="code-block m-0 rounded-0"
             id="script-content"
             style="min-height:200px; border-radius:0; border:none;
                    border-top:1px solid var(--border);">加载中…</pre>
      </div>
      <div class="modal-footer gap-2">
        <button class="btn btn-sm btn-outline-secondary" onclick="copyScript()">
          <i class="bi bi-clipboard me-1"></i>复制
        </button>
        <button type="button" class="btn btn-sm btn-outline-secondary"
                data-bs-dismiss="modal">关闭</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="/static/chart.umd.min.js"></script>
<script>
Chart.defaults.color       = '#4d6480';
Chart.defaults.borderColor = 'rgba(61,127,255,.12)';
Chart.defaults.font.family = 'var(--font-ui, system-ui)';

let _scriptModal;

async function loadData() {
  // Summary stats
  try {
    const r = await fetch('/api/test-results');
    const j = await r.json();
    const rows = j.data || [];
    const total  = rows.reduce((a, b) => a + (b.total_tests  || 0), 0);
    const passed = rows.reduce((a, b) => a + (b.passed_tests || 0), 0);
    const failed = total - passed;

    countUp(document.getElementById('stat-total-cases'), total);
    countUp(document.getElementById('stat-pass-rate'),
            total > 0 ? (passed / total * 100).toFixed(1) : null, '%');
    countUp(document.getElementById('stat-failed'), failed);

    if (rows.length) renderPassRateChart(rows);
  } catch(e) { console.warn(e); }

  // Failed tests
  try {
    const r = await fetch('/api/test-results/failed');
    const j = await r.json();
    const rows = j.data || [];
    document.getElementById('fail-count').textContent = rows.length + ' 条';
    const tbody = document.getElementById('fail-tbody');
    if (!rows.length) {
      tbody.innerHTML = `<tr><td colspan="4">
        <div class="empty-state">
          <i class="bi bi-check-circle" style="color:var(--success);"></i>
          <div style="color:var(--success);">暂无失败用例</div>
        </div></td></tr>`;
    } else {
      tbody.innerHTML = rows.map(r => `<tr>
        <td class="ps-3">
          <code style="font-size:.78rem;">${escHtml(r.ir_name || '—')}</code>
        </td>
        <td style="font-size:.78rem; max-width:200px; overflow:hidden;
                   text-overflow:ellipsis; white-space:nowrap;
                   color:var(--text-dim);"
            title="${escHtml(r.mr_description || '')}">
          ${escHtml(r.mr_description || '—')}
        </td>
        <td style="font-family:var(--font-mono); font-size:.78rem; color:var(--danger);">
          ${r.actual_diff != null ? r.actual_diff.toExponential(2) : '—'}
        </td>
        <td style="font-size:.72rem; color:var(--text-dim);">
          ${(r.timestamp || '').slice(0,16)}
        </td>
      </tr>`).join('');
    }
  } catch(e) { console.warn(e); }

  // Evidence packs
  try {
    const r = await fetch('/api/evidence');
    const j = await r.json();
    const packs = j.data || [];
    document.getElementById('evidence-count').textContent = packs.length + ' 个';
    countUp(document.getElementById('stat-evidence'), packs.length);

    const container = document.getElementById('evidence-list');
    if (!packs.length) {
      container.innerHTML = `<div class="empty-state">
        <i class="bi bi-folder-x"></i>
        <div>暂无证据包</div>
      </div>`;
    } else {
      container.innerHTML = `<ul class="list-group list-group-flush">` +
        packs.slice(0, 50).map(p => `
        <li class="list-group-item list-group-item-action
                   d-flex justify-content-between align-items-start py-2 px-3">
          <div style="min-width:0; flex:1;">
            <div style="font-family:var(--font-mono); font-size:.75rem;
                        font-weight:600; color:var(--text-code);
                        overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">
              ${escHtml(p.id || '—')}
            </div>
            <div style="font-size:.72rem; color:var(--text-dim); margin-top:1px;">
              ${escHtml(p.operator || '')}
            </div>
          </div>
          <button class="btn btn-sm btn-outline-warning py-0 px-2 ms-2 flex-shrink-0"
                  style="font-size:.72rem;"
                  onclick="showScript('${escHtml(p.id || '')}')">
            <i class="bi bi-code me-1"></i>脚本
          </button>
        </li>`).join('') + `</ul>`;
    }
  } catch(e) { console.warn(e); }
}

function renderPassRateChart(rows) {
  const labels = rows.map(r => r.ir_name.replace(/torch\.nn\.functional\./, ''));
  const rates  = rows.map(r => r.total_tests > 0
    ? (r.passed_tests / r.total_tests * 100) : 0);

  new Chart(document.getElementById('chart-pass-rate'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: '通过率 (%)', data: rates,
        backgroundColor: rates.map(v =>
          v >= 90 ? 'rgba(0,200,150,.75)'
        : v >= 70 ? 'rgba(255,171,0,.75)'
        :           'rgba(255,69,69,.75)'),
        borderRadius: 4,
      }]
    },
    options: {
      indexAxis: 'y',
      plugins: {
        legend: { display:false },
        tooltip: {
          backgroundColor:'#111a2e', borderColor:'rgba(61,127,255,.25)',
          borderWidth:1, titleColor:'#bfd0e8', bodyColor:'#4d6480', padding:10,
          callbacks: { label: ctx => ` ${ctx.raw.toFixed(1)}%` }
        }
      },
      scales: {
        x: {
          min:0, max:100,
          grid:{ color:'rgba(61,127,255,.08)' },
          ticks:{ color:'#4d6480', callback: v => v + '%' }
        },
        y: {
          grid:{display:false},
          ticks:{ color:'#bfd0e8', font:{size:11} }
        }
      }
    }
  });
}

async function showScript(id) {
  if (!_scriptModal)
    _scriptModal = new bootstrap.Modal(document.getElementById('scriptModal'));
  document.getElementById('script-content').textContent = '加载中…';
  _scriptModal.show();
  try {
    const r = await fetch('/api/evidence/' + encodeURIComponent(id) + '/script');
    const j = await r.json();
    document.getElementById('script-content').textContent =
      j.data?.script || '（脚本为空）';
  } catch(e) {
    document.getElementById('script-content').textContent = '加载失败：' + e.message;
  }
}

function copyScript() {
  navigator.clipboard?.writeText(
    document.getElementById('script-content').textContent);
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadData();
</script>
{% endblock %}
